    <script>
        const firebaseConfig = { apiKey: "AIzaSyDcQNHIUYSbJe8qnc4EqzRpGmQ4qufz7Ok", authDomain: "aje-executive-db.firebaseapp.com", databaseURL: "https://aje-executive-db-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "aje-executive-db", storageBucket: "aje-executive-db.firebasestorage.app", messagingSenderId: "25421275822", appId: "1:25421275822:web:8de86422d025e2cd25c33f" };

            'board': `<div class="w-full h-full p-8 animate-fade-in bg-slate-100 flex flex-col" id="kanbanContainer"><div class="flex justify-between items-center mb-6"><div><h2 class="text-2xl font-bold text-slate-800">Task Board</h2><p class="text-slate-500 text-sm mt-1">카드의 <i class="fa-solid fa-pen-to-square"></i> 버튼을 눌러 상세 정보를 적어보세요.</p></div><button onclick="addNewTask()" class="bg-slate-800 text-white px-5 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-slate-700 transition"><i class="fa-solid fa-plus mr-1"></i> 새 업무 등록</button></div><div class="flex-1 grid grid-cols-1 md:grid-cols-3 gap-6 overflow-hidden pb-4"><div class="bg-slate-200/50 rounded-xl flex flex-col overflow-hidden border border-slate-200"><div class="bg-slate-200 p-3 border-b border-slate-300"><h3 class="font-bold text-slate-700 text-sm"><i class="fa-solid fa-circle-dot text-rose-400 mr-2"></i>계획 (To Do)</h3></div><div id="col-todo" class="flex-1 p-3 overflow-y-auto space-y-3 custom-scrollbar" ondragover="allowDrop(event)" ondrop="dropTask(event, 'todo')"><p class="text-xs text-slate-400 text-center mt-5">로그인 해주세요...</p></div></div><div class="bg-slate-200/50 rounded-xl flex flex-col overflow-hidden border border-slate-200"><div class="bg-slate-200 p-3 border-b border-slate-300"><h3 class="font-bold text-slate-700 text-sm"><i class="fa-solid fa-spinner text-amber-500 mr-2"></i>진행 중 (Doing)</h3></div><div id="col-doing" class="flex-1 p-3 overflow-y-auto space-y-3 custom-scrollbar" ondragover="allowDrop(event)" ondrop="dropTask(event, 'doing')"></div></div><div class="bg-slate-200/50 rounded-xl flex flex-col overflow-hidden border border-slate-200"><div class="bg-slate-200 p-3 border-b border-slate-300"><h3 class="font-bold text-slate-700 text-sm"><i class="fa-solid fa-check-circle text-emerald-500 mr-2"></i>완료 (Done)</h3></div><div id="col-done" class="flex-1 p-3 overflow-y-auto space-y-3 custom-scrollbar" ondragover="allowDrop(event)" ondrop="dropTask(event, 'done')"></div></div></div></div>`,

            // 🛡️ [NEW] Master Vault 다크 테마 HTML

                            <i class="fa-solid fa-file-csv text-lg"></i> DB 엑셀 추출 (CSV)

                    </div>
                    
                    <div class="flex-1 bg-slate-800/50 rounded-xl border border-slate-700 overflow-hidden flex flex-col shadow-2xl">
                        <div class="bg-slate-800 px-4 py-3 border-b border-slate-700 flex justify-between items-center">
                            <span class="text-xs font-bold text-slate-400 uppercase tracking-wider"><i class="fa-solid fa-database mr-2"></i>Task Database Log</span>
                        </div>
                        <div class="overflow-x-auto flex-1 custom-scrollbar">
                            <table class="w-full text-left text-sm whitespace-nowrap">

                    activeBtn.classList.replace('bg-slate-950', 'bg-rose-900');
                    activeBtn.classList.replace('text-slate-500', 'text-white');
                    activeBtn.classList.replace('border-slate-800', 'border-rose-500');
                } else {
                    activeBtn.classList.replace('text-slate-300', 'text-white');
                    activeBtn.classList.add('bg-indigo-600');
                }
            }

            document.getElementById('pageTitle').innerText = pageTitles[pageId];
            document.getElementById('contentArea').innerHTML = pages[pageId];

            if (pageId === 'cloud') loadGallery();
            if (pageId === 'board') initKanban();
            if (pageId === 'vault') initVault(); // 🛡️ Vault 진입 시 DB 호출
        }

        // 🛡️ [NEW] Master Vault 데이터 테이블 로직
        function initVault() {
            if (!currentUser) { document.getElementById('vaultTableBody').innerHTML = '<tr><td colspan="4" class="p-8 text-center text-rose-500 font-bold"><i class="fa-solid fa-lock mr-2"></i>접근 권한이 없습니다. (로그인 필요)</td></tr>'; return; }

            // DB에서 최신 데이터를 한 번만 가져옵니다 (once)
            db.ref(`users/${currentUser.uid}/tasks`).once('value').then((snapshot) => {
                const tbody = document.getElementById('vaultTableBody');
                if (!tbody) return;

                boardData = snapshot.val() || {};

                if (Object.keys(boardData).length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-slate-500">저장된 데이터 로그가 없습니다.</td></tr>';
                    return;
                }

                tbody.innerHTML = '';
                const statusHTML = { 'todo': '<span class="bg-rose-500/20 text-rose-400 px-2 py-1 rounded-md text-xs font-bold border border-rose-500/30">계획 (To-Do)</span>', 'doing': '<span class="bg-amber-500/20 text-amber-400 px-2 py-1 rounded-md text-xs font-bold border border-amber-500/30">진행 중 (Doing)</span>', 'done': '<span class="bg-emerald-500/20 text-emerald-400 px-2 py-1 rounded-md text-xs font-bold border border-emerald-500/30">완료 (Done)</span>' };

                Object.keys(boardData).forEach(key => {
                    const task = boardData[key];
                    const partnerText = task.partner ? `<i class="fa-solid fa-building text-slate-500 mr-1"></i>${task.partner}` : '<span class="text-slate-600">-</span>';

                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-700/50 transition duration-150";
                    tr.innerHTML = `
                        <td class="p-4 font-bold text-slate-200">${task.text}</td>
                        <td class="p-4">${statusHTML[task.status] || task.status}</td>
                        <td class="p-4 text-slate-400 font-mono text-xs">${task.date}</td>
                        <td class="p-4 text-slate-300 text-xs">${partnerText}</td>
                    `;
                    tbody.appendChild(tr);
                });
            });
        }

        // 🛡️ [NEW] 엑셀 (CSV) 추출 마법 로직
        function exportToCSV() {
            if (!currentUser || Object.keys(boardData).length === 0) return alert("추출할 데이터가 없습니다. 먼저 Task Board에 데이터를 입력해주세요.");

            // 💡 엑셀에서 한글이 깨지지 않게 하는 마법의 코드 (\uFEFF)
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
            csvContent += "업무명(Task),상태(Status),생성일,협력업체(Partner),기자재(Equipment),메모(Notes)\n"; // 엑셀 헤더(첫 줄)

            Object.keys(boardData).forEach(key => {
                const t = boardData[key];

                // 쉼표나 줄바꿈이 있는 텍스트를 엑셀 셀 하나에 예쁘게 넣기 위한 처리
                const escapeCSV = (str) => {
                    if (!str) return "";
                    return '"' + String(str).replace(/"/g, '""') + '"';
                };

                const statusName = t.status === 'todo' ? '계획(To-Do)' : (t.status === 'doing' ? '진행중(Doing)' : '완료(Done)');

                // 엑셀 가로줄 완성
                csvContent += `${escapeCSV(t.text)},${statusName},${escapeCSV(t.date)},${escapeCSV(t.partner)},${escapeCSV(t.equipment)},${escapeCSV(t.notes)}\n`;
            });

            // 다운로드 실행
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `ProjectLEE_Admin_DB_${new Date().toISOString().slice(0, 10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 칸반 보드 로직 (그대로)
        function initKanban() { if (!currentUser) { document.getElementById('col-todo').innerHTML = '<p class="text-xs text-rose-500 text-center mt-5 font-bold">먼저 로그인해 주세요!</p>'; return; } db.ref(`users/${currentUser.uid}/tasks`).on('value', (snapshot) => { const todoCol = document.getElementById('col-todo'); const doingCol = document.getElementById('col-doing'); const doneCol = document.getElementById('col-done'); if (!todoCol) return; todoCol.innerHTML = ''; doingCol.innerHTML = ''; doneCol.innerHTML = ''; boardData = snapshot.val() || {}; Object.keys(boardData).forEach(key => { const task = boardData[key]; const cardHTML = `<div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 cursor-grab active:cursor-grabbing hover:shadow-md transition relative group" draggable="true" ondragstart="dragTask(event, '${key}')"><p class="text-sm font-bold text-slate-800 break-words mb-2 leading-tight">${task.text}</p>${(task.partner || task.equipment || task.notes) ? '<p class="text-[10px] text-indigo-500 mb-2 font-bold"><i class="fa-solid fa-message mr-1"></i>상세 내용 있음</p>' : ''}<div class="flex justify-between items-center text-[10px] text-slate-400 font-medium mt-3 pt-2 border-t border-slate-50"><span><i class="fa-regular fa-clock"></i> ${task.date}</span><div class="flex gap-2"><button onclick="openModal('${key}')" class="bg-slate-100 hover:bg-indigo-100 text-slate-500 hover:text-indigo-600 w-6 h-6 rounded-md transition" title="상세정보 편집"><i class="fa-solid fa-pen-to-square text-xs"></i></button><button onclick="deleteTask('${key}')" class="bg-slate-100 hover:bg-rose-100 text-slate-500 hover:text-rose-500 w-6 h-6 rounded-md transition" title="삭제"><i class="fa-solid fa-trash text-xs"></i></button></div></div></div>`; if (task.status === 'todo') todoCol.innerHTML += cardHTML; else if (task.status === 'doing') doingCol.innerHTML += cardHTML; else if (task.status === 'done') doneCol.innerHTML += cardHTML; }); }); }
        function openModal(key) { currentEditKey = key; const task = boardData[key]; document.getElementById('modalTitle').innerText = task.text; document.getElementById('modalPartner').value = task.partner || ''; document.getElementById('modalEquipment').value = task.equipment || ''; document.getElementById('modalNotes').value = task.notes || ''; const modal = document.getElementById('taskModal'); const modalBox = document.getElementById('taskModalBox'); modal.classList.remove('hidden'); setTimeout(() => { modal.classList.remove('opacity-0'); modalBox.classList.remove('scale-95'); modalBox.classList.add('scale-100'); }, 10); }
        function closeModal() { const modal = document.getElementById('taskModal'); const modalBox = document.getElementById('taskModalBox'); modal.classList.add('opacity-0'); modalBox.classList.remove('scale-100'); modalBox.classList.add('scale-95'); setTimeout(() => { modal.classList.add('hidden'); currentEditKey = null; }, 300); }
        function saveTaskDetails() { if (!currentEditKey || !currentUser) return; db.ref(`users/${currentUser.uid}/tasks/${currentEditKey}`).update({ partner: document.getElementById('modalPartner').value, equipment: document.getElementById('modalEquipment').value, notes: document.getElementById('modalNotes').value }).then(() => closeModal()).catch(e => alert("저장 실패!")); }
        function addNewTask() { if (!currentUser) return; const taskText = prompt("어떤 업무를 계획 중이신가요?"); if (!taskText || taskText.trim() === "") return; db.ref(`users/${currentUser.uid}/tasks`).push({ text: taskText, status: 'todo', date: new Date().toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' }) }); }
        function deleteTask(taskKey) { if (confirm("이 업무를 완전히 삭제하시겠습니까?")) db.ref(`users/${currentUser.uid}/tasks/${taskKey}`).remove(); }
        function dragTask(e, taskKey) { draggedTaskKey = taskKey; e.dataTransfer.effectAllowed = "move"; } function allowDrop(e) { e.preventDefault(); } function dropTask(e, newStatus) { e.preventDefault(); if (draggedTaskKey && currentUser) { db.ref(`users/${currentUser.uid}/tasks/${draggedTaskKey}`).update({ status: newStatus }); draggedTaskKey = null; } }

        // 클라우드 로직 (그대로)
        function handleDragOver(e) { e.preventDefault(); document.getElementById('dropZone').classList.add('border-indigo-500', 'bg-indigo-100'); } function handleDragLeave(e) { e.preventDefault(); document.getElementById('dropZone').classList.remove('border-indigo-500', 'bg-indigo-100'); } function handleDrop(e) { e.preventDefault(); document.getElementById('dropZone').classList.remove('border-indigo-500', 'bg-indigo-100'); const file = e.dataTransfer.files[0]; if (file) uploadFile(file); } function handleFileSelect(e) { const file = e.target.files[0]; if (file) uploadFile(file); }
        function uploadFile(file) { if (!currentUser) return; if (file.size > 5 * 1024 * 1024) return alert("5MB 이하만 가능합니다."); const uploadTask = storage.ref(`users/${currentUser.uid}/cloud/${Date.now()}_${file.name}`).put(file); document.getElementById('progressContainer').classList.remove('hidden'); uploadTask.on('state_changed', (snap) => { document.getElementById('uploadProgress').style.width = (snap.bytesTransferred / snap.totalBytes * 100) + '%'; }, (err) => { document.getElementById('progressContainer').classList.add('hidden'); }, () => { document.getElementById('uploadProgress').style.width = '0%'; document.getElementById('progressContainer').classList.add('hidden'); loadGallery(); }); }
        function loadGallery() { const grid = document.getElementById('galleryGrid'); if (!grid) return; if (!currentUser) return; grid.innerHTML = '<p class="text-indigo-400 text-sm col-span-full py-10 animate-pulse">불러오는 중... ☁️</p>'; storage.ref(`users/${currentUser.uid}/cloud`).listAll().then((res) => { if (res.items.length === 0) { grid.innerHTML = '<p class="text-slate-400 text-sm col-span-full py-10">저장된 파일이 없습니다.</p>'; return; } grid.innerHTML = ''; res.items.reverse().forEach((itemRef) => { itemRef.getDownloadURL().then((url) => { const isVideo = itemRef.name.match(/\.(mp4|webm|ogg|mov)$/i); const card = document.createElement('div'); card.className = "relative group rounded-xl overflow-hidden bg-slate-200 aspect-square shadow-sm"; card.innerHTML = isVideo ? `<video src="${url}" class="w-full h-full object-cover" controls preload="metadata"></video>` : `<img src="${url}" class="w-full h-full object-cover transition duration-300 group-hover:scale-110">`; const delBtn = document.createElement('button'); delBtn.className = "absolute top-2 right-2 bg-rose-500 text-white w-8 h-8 rounded-full opacity-0 group-hover:opacity-100 transition shadow-lg flex items-center justify-center hover:bg-rose-600"; delBtn.innerHTML = '<i class="fa-solid fa-trash text-xs"></i>'; delBtn.onclick = () => { if (confirm("완전히 삭제하시겠습니까?")) itemRef.delete().then(() => loadGallery()); }; card.appendChild(delBtn); grid.appendChild(card); }); }); }); }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        @keyframes typing {
            from {
                width: 0
            }

            to {
                width: 100%
            }
        }

        @keyframes blink {

            from,
            to {
                border-color: transparent
            }

            50% {
                border-color: currentColor;
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</body>

</html>
