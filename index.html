<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Project LEE — Executive OS" />
    <link rel="manifest" href="manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Space+Mono:wght@400;700&family=Pretendard:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <title>Project LEE — Executive OS</title>
    <style>
        /* ─── 기존 테마 유지 ─── */
        :root {
            --bg: #0f172a;
            --bg2: #1e293b;
            --bg3: #334155;
            --surface: #1e293b;
            --surface2: #273549;
            --border: rgba(148, 163, 184, .15);
            --border2: rgba(148, 163, 184, .25);
            --text: #f1f5f9;
            --text2: #94a3b8;
            --text3: #64748b;
            --accent: #6366f1;
            --accent2: #10b981;
            --accent-dim: rgba(99, 102, 241, .12);
            --gold: #f59e0b;
            --red: #f43f5e;
            --purple: #a78bfa;
            --radius: 14px;
            --radius-sm: 8px;
            --sidebar: 220px;
            --topbar: 56px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ─── Lang Studio 전용 스타일 ─── */
        .studio-tab-bar {
            display: flex;
            gap: 4px;
            background: var(--bg3);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .studio-tab-btn {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--text2);
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .studio-tab-btn.active {
            background: var(--accent);
            color: #fff;
        }

        .studio-panel {
            display: none;
        }

        .studio-panel.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        #scriptHighlight {
            min-height: 200px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            line-height: 1.8;
            white-space: pre-wrap;
            outline: none;
            margin-bottom: 12px;
        }

        .hl-sentence {
            transition: all 0.2s;
            cursor: pointer;
            border-radius: 4px;
        }

        .active-sentence {
            background: var(--accent-dim);
            color: var(--purple);
            box-shadow: 0 0 0 2px var(--accent-dim);
        }

        .news-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
            transition: 0.2s;
        }

        .news-card:hover {
            border-color: var(--accent);
        }

        .news-title {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .news-desc {
            font-size: 12px;
            color: var(--text2);
            line-height: 1.5;
        }

        .voca-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 8px;
        }

        .voca-word {
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            color: var(--accent);
            font-size: 16px;
        }

        .voca-meaning {
            color: var(--accent2);
            font-size: 13px;
            margin: 2px 0;
        }

        .voca-example {
            font-size: 12px;
            color: var(--text3);
            font-style: italic;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        /* ─── 레이아웃 스타일 (Work's Way 스타일 계승) ─── */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--topbar);
            z-index: 200;
            background: rgba(15, 23, 42, .92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px 0 calc(var(--sidebar)+20px);
            justify-content: space-between;
            transition: padding .3s;
        }

        .topbar.full {
            padding-left: 20px;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: var(--sidebar);
            z-index: 150;
            background: var(--bg2);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding-top: var(--topbar);
            transition: transform .3s;
        }

        .sidebar.hidden {
            transform: translateX(-100%);
        }

        main {
            margin-left: var(--sidebar);
            padding-top: var(--topbar);
            min-height: 100vh;
            transition: margin .3s;
        }

        main.full {
            margin-left: 0;
        }

        .page {
            display: none;
            padding: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .page.active {
            display: block;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 16px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text2);
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            color: var(--text);
            background: var(--bg3);
            outline: none;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text2);
            margin-bottom: 2px;
        }

        .nav-item.active {
            background: var(--accent-dim);
            color: var(--accent);
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div id="login-screen"
        style="display:flex; position:fixed; inset:0; background:var(--bg); z-index:500; align-items:center; justify-content:center;">
        <div style="width:400px; padding:20px; text-align:center;">
            <h1 style="font-family:'DM Serif Display'; font-size:32px; margin-bottom:20px;">Project LEE</h1>
            <button onclick="doLogin()"
                style="background:var(--accent); color:#fff; border:none; padding:12px 24px; border-radius:100px; font-weight:700; cursor:pointer;">Google
                계정으로 로그인</button>
        </div>
    </div>

    <div class="topbar full" id="topbar">
        <div style="display:flex; align-items:center; gap:12px;">
            <button onclick="toggleSidebar()"
                style="background:none; border:none; color:var(--text); cursor:pointer;">☰</button>
            <span style="font-family:'DM Serif Display'; font-size:20px;">Executive OS</span>
        </div>
        <div id="user-info" style="display:none; align-items:center; gap:10px;">
            <img id="user-photo" src="" style="width:32px; height:32px; border-radius:50%;">
            <span id="user-name" style="font-size:13px; font-weight:600;"></span>
        </div>
    </div>

    <div class="sidebar hidden" id="sidebar">
        <div style="padding:16px;">
            <div class="nav-item active" onclick="switchPage('dashboard')" data-page="dashboard">🏠 Dashboard</div>
            <div style="margin-top:20px; font-size:11px; color:var(--text3); font-weight:700; padding:0 14px;">어학 및 AI
            </div>
            <div class="nav-item" onclick="switchPage('langstudio')" data-page="langstudio">🎙️ Lang Studio</div>
        </div>
        <div style="margin-top:auto; padding:16px; border-top:1px solid var(--border);">
            <button onclick="doLogout()"
                style="width:100%; background:none; border:none; color:var(--red); text-align:left; cursor:pointer; font-size:13px;">🚪
                로그아웃</button>
        </div>
    </div>

    <main class="full" id="main">
        <div class="page active" id="page-dashboard">
            <h2 style="font-family:'DM Serif Display'; font-size:28px; margin-bottom:20px;">Welcome Back!</h2>
            <div class="card">Executive LEE 님, 오늘 하루도 바이브 넘치는 성취를 응원합니다.</div>
        </div>

        <div class="page" id="page-langstudio">
            <div style="margin-bottom:24px;">
                <h2 style="font-family:'DM Serif Display'; font-size:28px;">Lang Studio</h2>
                <p style="color:var(--text2); font-size:13px;">AI 뉴스 리딩과 나만의 단어장 통합 학습</p>
            </div>

            <div class="studio-tab-bar">
                <button class="studio-tab-btn active" onclick="switchStudioTab('voice')" id="s-tab-voice">🎙️ Voice
                    Studio</button>
                <button class="studio-tab-btn" onclick="switchStudioTab('voca')" id="s-tab-voca">📚 Voca Note</button>
            </div>

            <div id="panel-voice" class="studio-panel active">
                <div style="display:grid; grid-template-columns: 2fr 1fr; gap:20px;">
                    <div class="card">
                        <div id="scriptHighlight" contenteditable="true" data-placeholder="대본을 입력하거나 뉴스를 불러오세요...">
                        </div>
                        <div id="progressBar"
                            style="height:3px; background:var(--bg3); border-radius:10px; margin-bottom:12px;">
                            <div id="progressFill"
                                style="height:100%; width:0%; background:var(--accent); transition:0.3s;"></div>
                        </div>
                        <div style="display:flex; gap:8px;">
                            <button class="btn btn-primary" onclick="speakText()">▶ 재생</button>
                            <button class="btn btn-ghost" onclick="pauseResume()">⏸ 일시정지</button>
                            <button class="btn btn-ghost" style="color:var(--red);" onclick="stopText()">⏹ 정지</button>
                        </div>
                    </div>
                    <div class="card">
                        <h4 style="font-size:12px; font-weight:700; margin-bottom:10px;">글로벌 영문 뉴스</h4>
                        <div id="news-list" style="max-height:400px; overflow-y:auto;">
                            <p style="font-size:12px; color:var(--text3);">뉴스를 불러오는 중...</p>
                        </div>
                    </div>
                </div>
            </div>

            <div id="panel-voca" class="studio-panel">
                <div style="display:grid; grid-template-columns: 1fr 2fr; gap:20px;">
                    <div class="card">
                        <h4 style="font-size:14px; margin-bottom:16px;">새 단어 추가</h4>
                        <input type="text" id="v-word" class="form-input" placeholder="Word (e.g. Persistence)"
                            style="margin-bottom:10px;">
                        <input type="text" id="v-mean" class="form-input" placeholder="Meaning (e.g. 인내)"
                            style="margin-bottom:10px;">
                        <textarea id="v-ex" class="form-textarea" placeholder="Example sentence..."
                            style="margin-bottom:12px;"></textarea>
                        <button class="btn btn-primary" style="width:100%;" onclick="saveVoca()">저장하기</button>
                    </div>
                    <div class="card">
                        <div
                            style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                            <h4 style="font-size:14px;">내 단어장</h4>
                            <button class="btn btn-ghost btn-sm" onclick="playVocaAll()">▶ 전체 자동 재생</button>
                        </div>
                        <div id="voca-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, getDocs, onSnapshot, query, orderBy, deleteDoc, doc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        // 🚀 [CTO 패치] 실제 설정값으로 채우십시오!
        const firebaseConfig = { apiKey: "AIzaSyDcQNHIUYSbJe8qnc4EqzRpGmQ4qufz7Ok", authDomain: "aje-executive-db.firebaseapp.com", projectId: "aje-executive-db", storageBucket: "aje-executive-db.firebasestorage.app", appId: "1:25421275822:web:8de86422d025e2cd25c33f" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;

        // --- Auth ---
        window.doLogin = () => signInWithPopup(auth, new GoogleAuthProvider());
        window.doLogout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, user => {
            if (user) {
                currentUser = user;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('user-info').style.display = 'flex';
                document.getElementById('user-photo').src = user.photoURL;
                document.getElementById('user-name').textContent = user.displayName;
                document.getElementById('sidebar').classList.remove('hidden');
                document.getElementById('topbar').classList.remove('full');
                document.getElementById('main').classList.remove('full');
                loadVocabs();
                loadNews();
            }
        });

        // --- Navigation ---
        window.switchPage = (page) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
            document.querySelector(`[data-page="${page}"]`).classList.add('active');
        };
        window.switchStudioTab = (tab) => {
            document.querySelectorAll('.studio-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.studio-tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('panel-' + tab).classList.add('active');
            document.getElementById('s-tab-' + tab).classList.add('active');
        };
        window.toggleSidebar = () => {
            document.getElementById('sidebar').classList.toggle('hidden');
            document.getElementById('topbar').classList.toggle('full');
            document.getElementById('main').classList.toggle('full');
        };

        // --- Lang Studio: Voice & TTS ---
        const synth = window.speechSynthesis;
        let sentences = [];
        let currentIdx = 0;

        window.speakText = () => {
            const text = document.getElementById('scriptHighlight').innerText.trim();
            if (!text) return;
            synth.cancel();
            sentences = text.match(/[^.!?\n]+[.!?\n]*/g) || [text];
            currentIdx = 0;
            playSentence(0);
        };

        function playSentence(idx) {
            if (idx >= sentences.length) { stopText(); return; }
            currentIdx = idx;
            highlight(idx);
            const utter = new SpeechSynthesisUtterance(sentences[idx]);
            utter.lang = 'en-US'; utter.rate = 0.9;
            utter.onend = () => playSentence(idx + 1);
            synth.speak(utter);
        }

        function highlight(idx) {
            const el = document.getElementById('scriptHighlight');
            el.innerHTML = sentences.map((s, i) => `<span class="hl-sentence ${i === idx ? 'active-sentence' : ''}" id="s-${i}">${s}</span>`).join(' ');
            document.getElementById('s-' + idx)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
            document.getElementById('progressFill').style.width = `${((idx + 1) / sentences.length) * 100}%`;
        }

        window.pauseResume = () => synth.paused ? synth.resume() : synth.pause();
        window.stopText = () => { synth.cancel(); document.getElementById('progressFill').style.width = '0%'; };

        // --- Lang Studio: News ---
        async function loadNews() {
            const newsDiv = document.getElementById('news-list');
            const rssUrl = "https://feeds.bbci.co.uk/news/world/rss.xml";
            try {
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`);
                const data = await res.json();
                const parser = new DOMParser();
                const xml = parser.parseFromString(data.contents, "text/xml");
                const items = xml.querySelectorAll("item");
                newsDiv.innerHTML = Array.from(items).slice(0, 5).map(item => `
          <div class="news-card" onclick="document.getElementById('scriptHighlight').innerText='${item.querySelector("title").textContent.replace(/'/g, "")}.\\n\\n${item.querySelector("description").textContent.replace(/'/g, "")}'">
            <div class="news-title">${item.querySelector("title").textContent}</div>
            <div class="news-desc">${item.querySelector("description").textContent.substring(0, 80)}...</div>
          </div>
        `).join('');
            } catch (e) { newsDiv.innerHTML = "<p>뉴스를 불러올 수 없습니다.</p>"; }
        }

        // --- Lang Studio: Voca Note (CRUD) ---
        window.saveVoca = async () => {
            const word = document.getElementById('v-word').value, mean = document.getElementById('v-mean').value, ex = document.getElementById('v-ex').value;
            if (!word || !mean) return;
            await addDoc(collection(db, 'users', currentUser.uid, 'vocabs'), { word, mean, ex, createdAt: serverTimestamp() });
            document.getElementById('v-word').value = ''; document.getElementById('v-mean').value = ''; document.getElementById('v-ex').value = '';
        };

        function loadVocabs() {
            onSnapshot(query(collection(db, 'users', currentUser.uid, 'vocabs'), orderBy('createdAt', 'desc')), snap => {
                document.getElementById('voca-list').innerHTML = snap.docs.map(d => {
                    const v = d.data();
                    return `<div class="voca-item">
            <div style="display:flex; justify-content:space-between;">
              <div class="voca-word">${v.word}</div>
              <button onclick="deleteVoca('${d.id}')" style="color:var(--red); background:none; border:none; cursor:pointer;">✕</button>
            </div>
            <div class="voca-meaning">${v.mean}</div>
            <div class="voca-example">${v.ex || ''}</div>
          </div>`;
                }).join('');
            });
        }

        window.deleteVoca = async (id) => { if (confirm('삭제할까요?')) await deleteDoc(doc(db, 'users', currentUser.uid, 'vocabs', id)); };
    </script>
</body>

</html>
