            'vault': `<div class="w-full h-full p-8 animate-fade-in bg-slate-900 text-slate-200 flex flex-col overflow-y-auto custom-scrollbar" id="vaultContainer"><div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-5"><div><h2 class="text-2xl font-black text-rose-500 flex items-center gap-3 tracking-wide"><i class="fa-solid fa-shield-halved"></i> SYSTEM VAULT</h2><p class="text-slate-400 text-sm mt-2">최고 관리자 전용 통제소입니다.</p></div><button onclick="exportToCSV()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-2.5 rounded-lg text-sm font-bold shadow-lg transition flex items-center gap-2 border border-emerald-500"><i class="fa-solid fa-file-csv text-lg"></i> DB 엑셀 추출</button></div><div class="flex-1 bg-slate-800/50 rounded-xl border border-slate-700 overflow-hidden flex flex-col shadow-2xl"><div class="bg-slate-800 px-4 py-3 border-b border-slate-700 flex justify-between items-center"><span class="text-xs font-bold text-slate-400 uppercase tracking-wider"><i class="fa-solid fa-database mr-2"></i>Task Database Log</span></div><div class="overflow-x-auto flex-1 custom-scrollbar"><table class="w-full text-left text-sm whitespace-nowrap"><thead class="bg-slate-900/80 text-slate-400 sticky top-0 z-10 backdrop-blur-sm"><tr><th class="p-4 font-bold border-b border-slate-700">업무명</th><th class="p-4 font-bold border-b border-slate-700">상태</th><th class="p-4 font-bold border-b border-slate-700">생성일</th><th class="p-4 font-bold border-b border-slate-700">비고</th></tr></thead><tbody id="vaultTableBody" class="divide-y divide-slate-700/50"><tr><td colspan="4" class="p-8 text-center text-slate-500"><i class="fa-solid fa-spinner fa-spin mr-2"></i>데이터 불러오는 중...</td></tr></tbody></table></div></div></div>`,

        const pageTitles = {
            'home': 'Dashboard Overview',
            'photos': 'LEE\'s Personal Repository',

            'langstudio': 'Lang Studio (Voice & Voca)',

        function navigateTo(pageId) {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                if (btn.id === 'nav-vault') { btn.className = "nav-btn w-full flex items-center justify-between px-4 py-3 rounded-xl bg-slate-950 text-slate-500 hover:bg-rose-950 hover:text-rose-300 transition-all duration-300 border border-slate-800 group"; }
                else { btn.className = "nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white transition-all duration-300"; }
            });

            if (activeBtn) {
                if (pageId === 'vault') { activeBtn.classList.replace('bg-slate-950', 'bg-rose-900'); activeBtn.classList.replace('text-slate-500', 'text-white'); activeBtn.classList.replace('border-slate-800', 'border-rose-500'); }
                else { activeBtn.classList.replace('text-slate-300', 'text-white'); activeBtn.classList.add('bg-indigo-600'); }
            }
            document.getElementById('pageTitle').innerText = pageTitles[pageId];
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = pages[pageId];

            if (pageId === 'board') initKanban();
            if (pageId === 'vault') initVault();
            if (pageId === 'langstudio') initLangStudio();
            if (pageId === 'photos') {
                contentArea.innerHTML = '';
                if (window.DriveGallery?.load) window.DriveGallery.load();
            }
            if (pageId === 'linkvault') {
                contentArea.innerHTML = '';
                if (window.LinkVault?.load) window.LinkVault.load();
            }
            if (window.innerWidth < 1024) { document.querySelector('main').scrollIntoView({ behavior: 'smooth' }); }
        }

        // ==========================================
        // 🎙️ Lang Studio 로직
        // ==========================================
        function initLangStudio() { loadNews(); initVoca(); }
        function switchLangTab(tab) {
            document.getElementById('l-panel-voice').classList.toggle('hidden', tab !== 'voice');
            document.getElementById('l-panel-voca').classList.toggle('hidden', tab !== 'voca');
            document.getElementById('l-panel-voice').classList.toggle('flex', tab === 'voice');
            document.getElementById('l-panel-voca').classList.toggle('flex', tab === 'voca');

            document.getElementById('l-tab-voice').className = tab === 'voice' ? "pb-2 text-sm font-bold border-b-2 border-indigo-600 text-indigo-600 transition flex items-center gap-2" : "pb-2 text-sm font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-600 transition flex items-center gap-2";
            document.getElementById('l-tab-voca').className = tab === 'voca' ? "pb-2 text-sm font-bold border-b-2 border-indigo-600 text-indigo-600 transition flex items-center gap-2" : "pb-2 text-sm font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-600 transition flex items-center gap-2";
        }

        let currentNewsSource = 'bbc';
        const NEWS_FEEDS = { 'bbc': 'https://feeds.bbci.co.uk/news/world/rss.xml', 'techcrunch': 'https://techcrunch.com/feed/', 'nytimes': 'https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml' };
        window.changeNewsSource = function (src) {
            currentNewsSource = src;
            ['bbc', 'techcrunch', 'nytimes'].forEach(s => {
                const btn = document.getElementById('ns-' + s);
                if (btn) { btn.className = s === src ? "text-xs font-bold px-2 py-1 rounded bg-indigo-100 text-indigo-700 transition" : "text-xs font-bold px-2 py-1 rounded text-slate-400 hover:text-slate-600 transition"; }
            });
            loadNews();
        };

        async function fetchViaRss2json(rssUrl) {
            const api = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&count=10`;
            const res = await fetch(api);
            if (!res.ok) throw new Error('rss2json error');
            const data = await res.json();
            if (data.status !== 'ok' || !data.items?.length) throw new Error('No items');
            return data.items.map(item => ({ title: item.title || '', desc: (item.description || item.content || '').replace(/<[^>]*>?/gm, '').replace(/\s+/g, ' ').trim().slice(0, 200), link: item.link || '#' }));
        }

        async function fetchViaAllorigins(rssUrl) {
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`);
            const data = await res.json();
            const parser = new DOMParser();
            const xml = parser.parseFromString(data.contents, "text/xml");
            const items = xml.querySelectorAll("item, entry");
            if (!items.length) throw new Error('No items');
            return Array.from(items).slice(0, 10).map(item => {
                const title = item.querySelector("title")?.textContent || '';
                let desc = item.querySelector("description, summary")?.textContent || '';
                desc = desc.replace(/<[^>]*>?/gm, '').replace(/\s+/g, ' ').trim().slice(0, 200);
                const linkEl = item.querySelector("link");
                const link = (linkEl?.getAttribute('href') || linkEl?.textContent || '#').trim();
                return { title, desc, link };
            });
        }

        function renderNewsItems(items) {
            return items.map(({ title, desc, link }) => {
                const ct = title.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                const cd = desc.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                return `
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 hover:border-indigo-400 hover:shadow-md transition group flex flex-col gap-3">
                    <div class="cursor-pointer" onclick="setScriptText('${ct}', '${cd}')">
                        <h4 class="font-bold text-slate-800 text-sm mb-1 group-hover:text-indigo-600 transition">${title}</h4>
                        <p class="text-xs text-slate-500 line-clamp-2 leading-relaxed">${desc}</p>
                    </div>
                    <div class="flex justify-between items-center mt-1 pt-3 border-t border-slate-200">
                        <button class="text-xs font-bold text-indigo-500 hover:text-indigo-700 bg-indigo-50 hover:bg-indigo-100 transition px-3 py-1.5 rounded-md" onclick="setScriptText('${ct}', '${cd}')">🔊 대본으로</button>
                        <a href="${link}" target="_blank" class="text-xs font-bold text-slate-400 hover:text-slate-700 transition flex items-center gap-1"><i class="fa-solid fa-arrow-up-right-from-square"></i> 원문 보기</a>
                    </div>
                </div>`;
            }).join('');
        }

        async function loadNews() {
            const newsDiv = document.getElementById('news-list');
            if (!newsDiv) return;
            newsDiv.innerHTML = '<p class="text-sm text-slate-500 text-center mt-10"><i class="fa-solid fa-spinner fa-spin mr-2"></i>뉴스를 불러오는 중...</p>';
            const rssUrl = NEWS_FEEDS[currentNewsSource];
            try { const items = await fetchViaRss2json(rssUrl); newsDiv.innerHTML = renderNewsItems(items); }
            catch (e1) {
                try { const items = await fetchViaAllorigins(rssUrl); newsDiv.innerHTML = renderNewsItems(items); }
                catch (e2) { newsDiv.innerHTML = `<p class="text-sm text-rose-500 text-center mt-10"><i class="fa-solid fa-triangle-exclamation mr-2"></i>뉴스를 불러올 수 없습니다.<br>잠시 후 다시 시도해 주세요.</p>`; }
            }
        }

        window.setScriptText = (title, desc) => {
            const el = document.getElementById('scriptHighlight');
            if (el) { el.innerText = title + '.\n\n' + desc; el.classList.add('ring-2', 'ring-indigo-400'); setTimeout(() => el.classList.remove('ring-2', 'ring-indigo-400'), 500); }
        }

        const synth = window.speechSynthesis;
        let sentenceChain = [];
        let currentSentenceIdx = 0;
        let isSpeaking = false;

        window.speakText = () => {
            const rawText = document.getElementById('scriptHighlight').innerText.trim();
            if (!rawText) return;
            synth.cancel();
            isSpeaking = true;

            const sentenceRegex = /[^.!?\n]+[.!?\n]*/g;
            let match; sentenceChain = []; let html = ''; let idx = 0;
            while ((match = sentenceRegex.exec(rawText)) !== null) { const s = match[0]; if (s.trim().length === 0) continue; sentenceChain.push(s); html += `<span id="s-${idx}" class="transition-colors duration-200 rounded px-0.5">${s}</span>`; idx++; }
            document.getElementById('scriptHighlight').innerHTML = html;
            currentSentenceIdx = 0;

            function highlightSentence(i) {
                document.querySelectorAll('#scriptHighlight span').forEach(sp => { sp.classList.remove('bg-indigo-100', 'text-indigo-700', 'font-semibold'); });
                const el = document.getElementById('s-' + i);
                if (el) { el.classList.add('bg-indigo-100', 'text-indigo-700', 'font-semibold'); el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
                document.getElementById('progressFill').style.width = `${((i + 1) / sentenceChain.length) * 100}%`;
            }

            function speakNext(i) {
                if (!isSpeaking || i >= sentenceChain.length) {
                    if (i >= sentenceChain.length) { document.getElementById('progressFill').style.width = '0%'; document.querySelectorAll('#scriptHighlight span').forEach(sp => { sp.classList.remove('bg-indigo-100', 'text-indigo-700', 'font-semibold'); }); }
                    return;
                }
                highlightSentence(i);
                const utter = new SpeechSynthesisUtterance(sentenceChain[i].trim());
                utter.lang = 'en-US'; utter.rate = 0.92;
                utter.onend = () => { if (isSpeaking) speakNext(i + 1); };
                utter.onerror = () => { if (isSpeaking) speakNext(i + 1); };
                synth.speak(utter);
            }
            speakNext(0);
        };

        window.pauseResume = () => { if (synth.paused) { synth.resume(); } else { synth.pause(); } };
        window.stopText = () => { isSpeaking = false; synth.cancel(); document.getElementById('progressFill').style.width = '0%'; document.querySelectorAll('#scriptHighlight span').forEach(sp => { sp.classList.remove('bg-indigo-100', 'text-indigo-700', 'font-semibold'); }); };

        let isBulkMode = false; let currentVocaTab = 'learning'; let isPlayingAll = false;
        function toggleVocaMode() { isBulkMode = !isBulkMode; document.getElementById('vocaSingleMode').classList.toggle('hidden', isBulkMode); document.getElementById('vocaBulkMode').classList.toggle('hidden', !isBulkMode); document.getElementById('vocaModeBtn').innerHTML = isBulkMode ? '<i class="fa-solid fa-pen mr-1"></i>개별 등록으로 돌아가기' : '<i class="fa-solid fa-file-excel mr-1"></i>일괄 등록 열기'; }
        function setVocaTab(tabId) {
            currentVocaTab = tabId;
            const tabLearn = document.getElementById('tab-learning'); const tabArch = document.getElementById('tab-archived');
            if (tabId === 'learning') { tabLearn.className = "pb-2 text-sm font-bold border-b-2 border-indigo-600 text-indigo-600 transition flex items-center gap-2"; tabArch.className = "pb-2 text-sm font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-600 transition flex items-center gap-2"; }
            else { tabArch.className = "pb-2 text-sm font-bold border-b-2 border-emerald-500 text-emerald-500 transition flex items-center gap-2"; tabLearn.className = "pb-2 text-sm font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-600 transition flex items-center gap-2"; }
            renderVocaGrid(); if (isPlayingAll) togglePlayAll();
        }

        function initVoca() { if (!currentUser) { document.getElementById('vocaGrid').innerHTML = '<p class="text-rose-500 font-bold col-span-full text-center mt-10">먼저 로그인해 주세요!</p>'; return; } db.ref(`users/${currentUser.uid}/voca`).on('value', (snapshot) => { vocaData = snapshot.val() || {}; renderVocaGrid(); }); }
        function renderVocaGrid() {
            const grid = document.getElementById('vocaGrid'); if (!grid) return; grid.innerHTML = '';
            const keys = Object.keys(vocaData).reverse().filter(k => { const isArchived = vocaData[k].isArchived || false; return currentVocaTab === 'learning' ? !isArchived : isArchived; });
            if (keys.length === 0) { grid.innerHTML = `<p class="text-slate-400 text-sm col-span-full text-center py-10">${currentVocaTab === 'learning' ? '학습할 단어가 없습니다. 위에서 추가해보세요!' : '보관된 마스터 단어가 없습니다.'}</p>`; return; }
            keys.forEach(key => {
                const item = vocaData[key]; const archiveIcon = currentVocaTab === 'learning' ? '<i class="fa-solid fa-box-archive"></i> 보관' : '<i class="fa-solid fa-fire"></i> 학습으로 복귀'; const archiveColor = currentVocaTab === 'learning' ? 'hover:text-emerald-500' : 'hover:text-indigo-500';
                const cardHTML = `
                    <div class="bg-white p-5 rounded-xl shadow-sm border ${currentVocaTab === 'archived' ? 'border-emerald-200 bg-emerald-50/20' : 'border-slate-200'} hover:shadow-md transition relative flex flex-col justify-between group">
                        <div>
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="text-xl font-bold text-slate-800 break-words pr-2">${item.word}</h3>
                                <button onclick="speakVoca('${key}', 'word')" class="text-indigo-500 bg-indigo-50 hover:bg-indigo-100 hover:scale-110 shrink-0 w-8 h-8 rounded-full flex items-center justify-center transition shadow-sm"><i class="fa-solid fa-volume-high text-sm"></i></button>
                            </div>
                            <p class="text-sm font-extrabold text-pink-500 mb-4">${item.meaning}</p>
                            ${item.example ? `<div class="bg-slate-50 p-3 rounded-lg border border-slate-100 relative"><p class="text-xs text-slate-600 italic leading-relaxed pr-8">"${item.example}"</p><button onclick="speakVoca('${key}', 'example')" class="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 hover:text-indigo-500 transition hover:scale-110"><i class="fa-solid fa-circle-play text-lg"></i></button></div>` : ''}
                        </div>
                        <div class="mt-4 pt-3 border-t border-slate-100 flex justify-between items-center"><span class="text-[10px] text-slate-400"><i class="fa-regular fa-calendar mr-1"></i>${item.date}</span><div class="flex gap-3 opacity-0 group-hover:opacity-100 transition"><button onclick="toggleArchive('${key}', ${!(item.isArchived || false)})" class="text-slate-300 ${archiveColor} text-xs font-bold flex items-center gap-1 transition">${archiveIcon}</button><button onclick="deleteVoca('${key}')" class="text-slate-300 hover:text-rose-500 text-xs transition"><i class="fa-solid fa-trash"></i></button></div></div>
                    </div>`;
                grid.innerHTML += cardHTML;
            });
        }
        function toggleArchive(key, makeArchive) { db.ref(`users/${currentUser.uid}/voca/${key}`).update({ isArchived: makeArchive }); }
        function togglePlayAll() {
            if (!window.speechSynthesis) return alert("이 브라우저에서는 음성 듣기를 지원하지 않습니다.");
            const btn = document.getElementById('playAllBtn');
            if (isPlayingAll) { window.speechSynthesis.cancel(); isPlayingAll = false; btn.innerHTML = '<i class="fa-solid fa-play"></i> 현재 탭 전체 듣기'; btn.classList.replace('bg-rose-500', 'bg-indigo-600'); btn.classList.replace('hover:bg-rose-600', 'hover:bg-indigo-700'); return; }
            const keys = Object.keys(vocaData).reverse().filter(k => { const isArchived = vocaData[k].isArchived || false; return currentVocaTab === 'learning' ? !isArchived : isArchived; });
            if (keys.length === 0) return alert("읽을 단어가 없습니다.");
            isPlayingAll = true; btn.innerHTML = '<i class="fa-solid fa-stop"></i> 듣기 중지'; btn.classList.replace('bg-indigo-600', 'bg-rose-500'); btn.classList.replace('hover:bg-indigo-700', 'hover:bg-rose-600');
            keys.forEach(k => {
                const item = vocaData[k];
                const uWord = new SpeechSynthesisUtterance(item.word); uWord.lang = 'en-US'; uWord.rate = 0.9; window.speechSynthesis.speak(uWord);
                const uMean = new SpeechSynthesisUtterance(item.meaning); uMean.lang = 'ko-KR'; uMean.rate = 1.0; window.speechSynthesis.speak(uMean);
                if (item.example) { const uEx = new SpeechSynthesisUtterance(item.example); uEx.lang = 'en-US'; uEx.rate = 0.9; window.speechSynthesis.speak(uEx); }
            });
            const uEnd = new SpeechSynthesisUtterance("End of list."); uEnd.lang = 'en-US'; uEnd.volume = 0; uEnd.onend = () => { if (isPlayingAll) togglePlayAll(); }; window.speechSynthesis.speak(uEnd);
        }
        function speakVoca(key, type) { const item = vocaData[key]; if (!item) return; const textToSpeak = type === 'word' ? item.word : item.example; if (!window.speechSynthesis) return; window.speechSynthesis.cancel(); const msg = new SpeechSynthesisUtterance(textToSpeak); msg.lang = 'en-US'; msg.rate = 0.9; window.speechSynthesis.speak(msg); }
        function processAddVoca() {
            if (!currentUser) return alert("로그인 필요"); const dateStr = new Date().toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' });
            if (isBulkMode) {
                const text = document.getElementById('vocaBulkInput').value.trim(); if (!text) return; const lines = text.split('\n'); let count = 0;
                lines.forEach(line => { let separator = '\t'; let parts = line.split('\t'); if (parts.length < 2) { separator = ','; parts = line.split(','); } if (parts.length >= 2) { const word = parts[0].trim(); const meaning = parts[1].trim(); const example = parts.slice(2).join(separator).replace(/^"|"$/g, '').trim(); if (word && meaning) { db.ref(`users/${currentUser.uid}/voca`).push({ word, meaning, example, date: dateStr, isArchived: false }); count++; } } });
                alert(`${count}개의 단어가 성공적으로 일괄 등록되었습니다!`); document.getElementById('vocaBulkInput').value = ''; toggleVocaMode();
            } else {
                const word = document.getElementById('vocaWord').value.trim(); const meaning = document.getElementById('vocaMeaning').value.trim(); const example = document.getElementById('vocaExample').value.trim();
                if (!word || !meaning) return alert("단어와 뜻은 필수입니다!"); db.ref(`users/${currentUser.uid}/voca`).push({ word, meaning, example, date: dateStr, isArchived: false }).then(() => { document.getElementById('vocaWord').value = ''; document.getElementById('vocaMeaning').value = ''; document.getElementById('vocaExample').value = ''; });
            }
        }
        function deleteVoca(key) { if (confirm("이 카드를 영구 삭제하시겠습니까?")) db.ref(`users/${currentUser.uid}/voca/${key}`).remove(); }


    </script>
