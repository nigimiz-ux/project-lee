<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project LEE - Executive OS</title>

    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#131417">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-rc.2/default.css">
    <script src="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-rc.2/index.min.js"></script>
</head>

<body
    class="bg-[#131417] font-sans flex flex-col min-h-screen lg:h-screen overflow-x-hidden lg:overflow-hidden text-slate-800 m-0 relative">

    <div id="splashScreen"
        class="fixed inset-0 bg-black flex flex-col items-center justify-center z-50 transition-opacity duration-700 overflow-hidden">
        <div
            class="absolute inset-0 bg-[linear-gradient(transparent_50%,rgba(0,0,0,0.5)_50%)] bg-[length:100%_4px] z-0 opacity-50 pointer-events-none">
        </div>
        <div class="relative z-10 flex flex-col items-center w-full max-w-md">
            <div id="loadingRings"
                class="relative w-40 h-40 flex items-center justify-center mb-10 transition-opacity duration-500">
                <div
                    class="absolute inset-0 rounded-full border-t-4 border-b-4 border-indigo-600 animate-[spin_2s_linear_infinite] opacity-80">
                </div>
                <div
                    class="absolute inset-2 rounded-full border-r-4 border-l-4 border-cyan-400 animate-[spin_3s_linear_infinite_reverse] opacity-50">
                </div>
                <i class="fa-solid fa-fingerprint text-6xl text-slate-300 animate-pulse"></i>
            </div>
            <div id="terminalText" class="font-mono text-left w-64 h-24 text-sm font-bold tracking-wider">
                <p class="text-emerald-400 mb-2 animate-typing overflow-hidden whitespace-nowrap border-r-4 border-emerald-400 w-0"
                    style="animation: typing 0.8s steps(30, end) forwards, blink .75s step-end infinite;">> NOW
                    LOADING...</p>
                <p class="text-cyan-400 mb-2 animate-typing overflow-hidden whitespace-nowrap border-r-4 border-cyan-400 w-0 opacity-0"
                    style="animation: typing 0.8s steps(30, end) forwards 1s, blink .75s step-end infinite 1s; animation-fill-mode: forwards;">
                    > SYSTEM INITIALIZED...</p>
                <p class="text-indigo-400 animate-typing overflow-hidden whitespace-nowrap border-r-4 border-indigo-400 w-0 opacity-0"
                    style="animation: typing 0.5s steps(30, end) forwards 2s, blink .75s step-end infinite 2s; animation-fill-mode: forwards;">
                    > ACCESS GRANTED.</p>
            </div>
            <div id="finalLogo"
                class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-col items-center opacity-0 scale-50 transition-all duration-700 pointer-events-none">
                <i class="fa-solid fa-cube text-5xl text-indigo-500 mb-3"
                    style="filter: drop-shadow(0 0 15px rgba(99,102,241,0.8));"></i>
                <h1 class="text-6xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 via-cyan-400 to-emerald-400 w-max"
                    style="filter: drop-shadow(0 0 20px rgba(45,212,191,0.5));">Proj. LEE</h1>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden w-full h-full flex flex-col lg:flex-row transition-opacity duration-1000 opacity-0">
        <aside
            class="lg:w-64 bg-slate-900 text-slate-300 flex flex-col transition-all duration-300 shadow-xl z-20 flex-shrink-0">
            <div class="h-20 flex items-center justify-center border-b border-slate-800 flex-shrink-0">
                <h1 class="text-2xl font-extrabold text-white tracking-wider flex items-center gap-3"><i
                        class="fa-solid fa-cube text-indigo-500"></i> Proj. <span class="text-indigo-500">LEE</span>
                </h1>
            </div>

            <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-2 custom-scrollbar">
                <p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4 px-2">Main System</p>
                <button onclick="navigateTo('home')" id="nav-home"
                    class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-indigo-600 text-white font-medium transition-all duration-300"><i
                        class="fa-solid fa-house w-5"></i> Dashboard</button>
                <button onclick="navigateTo('cloud')" id="nav-cloud"
                    class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white transition-all duration-300"><i
                        class="fa-solid fa-cloud-arrow-up w-5 text-cyan-400"></i> Mini Cloud</button>
                <button onclick="navigateTo('board')" id="nav-board"
                    class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white transition-all duration-300"><i
                        class="fa-solid fa-list-check w-5 text-amber-400"></i> Task Board</button>
                <button onclick="navigateTo('voca')" id="nav-voca"
                    class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white transition-all duration-300"><i
                        class="fa-solid fa-language w-5 text-pink-400"></i> Voca Note</button>

                <p class="text-xs font-bold text-slate-500 uppercase tracking-wider mt-8 mb-4 px-2">My Applications</p>
                <button onclick="navigateTo('diary')" id="nav-diary"
                    class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white transition-all duration-300"><i
                        class="fa-solid fa-book w-5 text-emerald-400"></i> Strategic Diary</button>
                <button onclick="navigateTo('voice')" id="nav-voice"
                    class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white transition-all duration-300"><i
                        class="fa-solid fa-headphones w-5 text-purple-400"></i> Voice Studio</button>
                <button onclick="navigateTo('tracker')" id="nav-tracker"
                    class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white transition-all duration-300"><i
                        class="fa-solid fa-shoe-prints w-5 text-orange-400"></i> Shoe Tracker</button>
                <button onclick="navigateTo('leave')" id="nav-leave"
                    class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white transition-all duration-300"><i
                        class="fa-solid fa-rocket w-5 text-blue-400"></i> 연차 결제</button>
            </nav>

            <div class="px-4 py-2 flex-shrink-0 border-t border-slate-800 mt-auto">
                <button onclick="navigateTo('vault')" id="nav-vault"
                    class="nav-btn w-full flex items-center justify-between px-4 py-3 rounded-xl bg-slate-950 text-slate-500 hover:bg-rose-950 hover:text-rose-300 hover:border-rose-800 transition-all duration-300 border border-slate-800 group">
                    <div class="flex items-center gap-3"><i
                            class="fa-solid fa-vault group-hover:text-rose-500 transition"></i><span
                            class="font-bold text-sm tracking-wide">Master Vault</span></div>
                    <i
                        class="fa-solid fa-lock text-[10px] opacity-30 group-hover:opacity-100 group-hover:text-rose-500"></i>
                </button>
            </div>
            <div class="p-4 border-t border-slate-800 bg-slate-900">
                <div class="flex items-center gap-3" id="userInfoArea">
                    <div
                        class="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center text-white font-bold text-xl">
                        ?</div>
                    <div>
                        <p class="text-sm font-bold text-slate-400 leading-tight">로그인 필요</p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-screen overflow-hidden bg-slate-50 relative">
            <header
                class="h-20 bg-white shadow-sm flex items-center justify-between px-8 z-10 flex-shrink-0 border-b border-slate-100">
                <h2 id="pageTitle" class="text-xl font-bold text-slate-800">Dashboard Overview</h2>
                <div class="flex items-center gap-4">
                    <button id="authBtn" onclick="toggleAuth()"
                        class="flex items-center gap-2 text-sm font-bold bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-full transition"><img
                            src="https://www.google.com/images/branding/product/2x/googleg_32dp.png" class="w-4 h-4"
                            alt="G"> 로그인</button>
                </div>
            </header>
            <div id="contentArea" class="flex-1 overflow-hidden relative bg-slate-50"></div>
        </main>
    </div>

    <div id="taskModal"
        class="hidden fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden flex flex-col transform scale-95 transition-transform duration-300 m-4"
            id="taskModalBox">
            <div class="bg-indigo-600 p-5 flex justify-between items-start text-white">
                <div><span class="text-indigo-200 text-xs font-bold tracking-wider uppercase mb-1 block"><i
                            class="fa-solid fa-circle-info"></i> Task Details</span>
                    <h3 class="font-extrabold text-xl leading-tight" id="modalTitle">업무 제목</h3>
                </div>
                <button onclick="closeModal()" class="text-indigo-200 hover:text-white transition"><i
                        class="fa-solid fa-xmark text-2xl"></i></button>
            </div>
            <div class="p-6 space-y-5 bg-slate-50">
                <div><label class="block text-xs font-bold text-slate-500 mb-1.5">협력업체 (Partner)</label><input
                        type="text" id="modalPartner"
                        class="w-full border border-slate-200 rounded-lg p-3 text-sm focus:border-indigo-500 outline-none">
                </div>
                <div><label class="block text-xs font-bold text-slate-500 mb-1.5">필요 기자재 주문 (Equipment)</label><input
                        type="text" id="modalEquipment"
                        class="w-full border border-slate-200 rounded-lg p-3 text-sm focus:border-indigo-500 outline-none">
                </div>
                <div><label class="block text-xs font-bold text-slate-500 mb-1.5">주의사항 및 메모 (Notes)</label><textarea
                        id="modalNotes" rows="4"
                        class="w-full border border-slate-200 rounded-lg p-3 text-sm focus:border-indigo-500 outline-none resize-none"></textarea>
                </div>
            </div>
            <div class="bg-white p-4 border-t border-slate-100 flex justify-end gap-3"><button onclick="closeModal()"
                    class="px-5 py-2 text-sm font-bold text-slate-500 hover:text-slate-700 transition">취소</button><button
                    onclick="saveTaskDetails()"
                    class="px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold rounded-lg transition shadow-md flex items-center gap-2"><i
                        class="fa-solid fa-check"></i> 저장하기</button></div>
        </div>
    </div>

    <script>
        MobileDragDrop.polyfill({ holdToDrag: 200, forceApply: true });
        window.addEventListener('touchmove', function () { }, { passive: false });

        const firebaseConfig = { apiKey: "AIzaSyDcQNHIUYSbJe8qnc4EqzRpGmQ4qufz7Ok", authDomain: "aje-executive-db.firebaseapp.com", databaseURL: "https://aje-executive-db-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "aje-executive-db", storageBucket: "aje-executive-db.firebasestorage.app", messagingSenderId: "25421275822", appId: "1:25421275822:web:8de86422d025e2cd25c33f" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const storage = firebase.storage(); const db = firebase.app().database("https://aje-executive-db-default-rtdb.firebaseio.com/");
        const provider = new firebase.auth.GoogleAuthProvider();

        let currentUser = null; let draggedTaskKey = null; let boardData = {}; let vocaData = {}; let currentEditKey = null;

        document.addEventListener("DOMContentLoaded", () => { setTimeout(() => { document.getElementById('loadingRings').style.opacity = '0'; document.getElementById('terminalText').style.opacity = '0'; document.getElementById('finalLogo').style.opacity = '1'; document.getElementById('finalLogo').style.transform = 'translate(-50%, -50%) scale(1)'; setTimeout(() => { document.getElementById('splashScreen').style.opacity = '0'; document.getElementById('mainApp').classList.remove('hidden'); setTimeout(() => { document.getElementById('mainApp').style.opacity = '1'; document.getElementById('splashScreen').style.display = 'none'; navigateTo('home'); }, 50); }, 400); }, 300); });

        function toggleAuth() { if (currentUser) { auth.signOut(); } else { auth.signInWithPopup(provider).catch((error) => { if (error.code === 'auth/popup-blocked') auth.signInWithRedirect(provider); else alert("로그인 에러: " + error.message); }); } }
        auth.getRedirectResult().catch(error => console.error(error));
        auth.onAuthStateChanged((user) => {
            const authBtn = document.getElementById('authBtn'); const userInfoArea = document.getElementById('userInfoArea');
            if (user) {
                currentUser = user; authBtn.innerHTML = `<span class="text-rose-500"><i class="fa-solid fa-power-off"></i> 로그아웃</span>`;
                userInfoArea.innerHTML = `<img src="${user.photoURL || 'https://ui-avatars.com/api/?name=Lee'}" class="w-10 h-10 rounded-full border-2 border-indigo-500 bg-white"><div><p class="text-sm font-bold text-white leading-tight">${user.displayName || 'Executive LEE'}</p><p class="text-xs text-slate-500">Executive Admin</p></div>`;
                if (document.getElementById('galleryGrid')) loadGallery(); if (document.getElementById('kanbanContainer')) initKanban(); if (document.getElementById('vaultTableBody')) initVault(); if (document.getElementById('vocaContainer')) initVoca();
            } else {
                currentUser = null; authBtn.innerHTML = `<img src="https://www.google.com/images/branding/product/2x/googleg_32dp.png" class="w-4 h-4" alt="G"> 로그인`;
                userInfoArea.innerHTML = `<div class="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center text-white font-bold text-xl">?</div><div><p class="text-sm font-bold text-slate-400 leading-tight">로그인 필요</p></div>`;
            }
        });

        // 🗣️ [NEW] Voca Note HTML (보관함 탭 & 전체 듣기 버튼 탑재)
        const pages = {
            'home': `<div class="w-full h-full p-8 animate-fade-in overflow-y-auto"><div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center justify-center py-24"><i class="fa-brands fa-space-awesome text-7xl text-indigo-100 mb-6"></i><h3 class="text-2xl font-bold text-slate-700 mb-3">Project LEE V2.8 가동 중</h3><p class="text-slate-500 text-center">Voca 보관함 및 전체 듣기(운전 모드) 기능이 탑재되었습니다.</p></div></div>`,
            'cloud': `<div class="w-full h-full p-8 animate-fade-in overflow-y-auto bg-slate-50 flex flex-col"><div class="mb-6"><h2 class="text-2xl font-bold text-slate-800">Mini Cloud Vault</h2><p class="text-slate-500 text-sm mt-1">이미지와 영상을 저장하세요.</p></div><div id="dropZone" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)" onclick="document.getElementById('fileInput').click()" class="w-full h-40 border-2 border-dashed border-indigo-300 rounded-2xl bg-indigo-50 flex flex-col items-center justify-center text-indigo-400 cursor-pointer mb-8 relative hover:bg-indigo-100"><i class="fa-solid fa-cloud-arrow-up text-4xl mb-3 pointer-events-none"></i><p class="font-bold pointer-events-none">클릭하거나 끌어다 놓으세요</p><input type="file" id="fileInput" class="hidden" accept="image/*,video/*" onchange="handleFileSelect(event)"><div id="progressContainer" class="absolute bottom-0 left-0 w-full h-1 bg-slate-200 rounded-b-2xl hidden overflow-hidden"><div id="uploadProgress" class="h-full bg-indigo-600 w-0 transition-all duration-300"></div></div></div><div class="flex items-center justify-between mb-4"><h3 class="text-lg font-bold text-slate-700">Saved Media</h3><button onclick="loadGallery()" class="text-xs text-indigo-500 font-bold"><i class="fa-solid fa-rotate-right"></i> 새로고침</button></div><div id="galleryGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 pb-10"><p class="text-slate-400 text-sm col-span-full py-10">로그인 대기 중...</p></div></div>`,
            'board': `<div class="w-full h-full p-8 animate-fade-in bg-slate-100 flex flex-col" id="kanbanContainer"><div class="flex justify-between items-center mb-6"><div><h2 class="text-2xl font-bold text-slate-800">Task Board</h2><p class="text-slate-500 text-sm mt-1">카드를 길게(0.2초) 누르면 드래그할 수 있습니다.</p></div><button onclick="addNewTask()" class="bg-slate-800 text-white px-5 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-slate-700 transition"><i class="fa-solid fa-plus mr-1"></i> 새 업무</button></div><div class="flex-1 grid grid-cols-1 md:grid-cols-3 gap-6 overflow-hidden pb-4"><div class="bg-slate-200/50 rounded-xl flex flex-col overflow-hidden border border-slate-200"><div class="bg-slate-200 p-3 border-b border-slate-300"><h3 class="font-bold text-slate-700 text-sm"><i class="fa-solid fa-circle-dot text-rose-400 mr-2"></i>계획 (To Do)</h3></div><div id="col-todo" class="flex-1 p-3 overflow-y-auto space-y-3 custom-scrollbar" ondragenter="allowDrop(event)" ondragover="allowDrop(event)" ondrop="dropTask(event, 'todo')"><p class="text-xs text-slate-400 text-center mt-5">로그인 해주세요...</p></div></div><div class="bg-slate-200/50 rounded-xl flex flex-col overflow-hidden border border-slate-200"><div class="bg-slate-200 p-3 border-b border-slate-300"><h3 class="font-bold text-slate-700 text-sm"><i class="fa-solid fa-spinner text-amber-500 mr-2"></i>진행 중 (Doing)</h3></div><div id="col-doing" class="flex-1 p-3 overflow-y-auto space-y-3 custom-scrollbar" ondragenter="allowDrop(event)" ondragover="allowDrop(event)" ondrop="dropTask(event, 'doing')"></div></div><div class="bg-slate-200/50 rounded-xl flex flex-col overflow-hidden border border-slate-200"><div class="bg-slate-200 p-3 border-b border-slate-300"><h3 class="font-bold text-slate-700 text-sm"><i class="fa-solid fa-check-circle text-emerald-500 mr-2"></i>완료 (Done)</h3></div><div id="col-done" class="flex-1 p-3 overflow-y-auto space-y-3 custom-scrollbar" ondragenter="allowDrop(event)" ondragover="allowDrop(event)" ondrop="dropTask(event, 'done')"></div></div></div></div>`,

            // 🗣️ Voca Note UI 
            'voca': `
                <div class="w-full h-full p-8 animate-fade-in bg-slate-50 flex flex-col overflow-hidden" id="vocaContainer">
                    <div class="flex justify-between items-center mb-6 shrink-0">
                        <div><h2 class="text-2xl font-bold text-slate-800">Voca Note</h2><p class="text-slate-500 text-sm mt-1">나만의 단어장과 보관함. 운전 중엔 전체 듣기를 활용하세요.</p></div>
                        <button onclick="togglePlayAll()" id="playAllBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-lg text-sm font-bold shadow-md transition flex items-center gap-2">
                            <i class="fa-solid fa-play"></i> 현재 탭 전체 듣기
                        </button>
                    </div>
                    
                    <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200 mb-4 shrink-0 relative transition-all">
                        <div class="flex justify-between items-end mb-4 border-b border-slate-100 pb-2">
                            <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider"><i class="fa-solid fa-pen"></i> 단어 등록 폼</h3>
                            <button onclick="toggleVocaMode()" id="vocaModeBtn" class="text-xs font-bold text-indigo-500 hover:text-indigo-700 transition"><i class="fa-solid fa-file-excel mr-1"></i>엑셀/CSV 일괄 등록 열기</button>
                        </div>
                        <div id="vocaSingleMode" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div><label class="block text-xs font-bold text-slate-500 mb-1">단어 / 숙어</label><input type="text" id="vocaWord" class="w-full border border-slate-200 rounded-lg p-2.5 text-sm focus:border-indigo-500 outline-none transition"></div>
                            <div><label class="block text-xs font-bold text-slate-500 mb-1">뜻</label><input type="text" id="vocaMeaning" class="w-full border border-slate-200 rounded-lg p-2.5 text-sm focus:border-indigo-500 outline-none transition"></div>
                            <div><label class="block text-xs font-bold text-slate-500 mb-1">예문</label><input type="text" id="vocaExample" class="w-full border border-slate-200 rounded-lg p-2.5 text-sm focus:border-indigo-500 outline-none transition"></div>
                        </div>
                        <div id="vocaBulkMode" class="hidden">
                            <label class="block text-xs font-bold text-slate-500 mb-2">엑셀 복사 붙여넣기 또는 쉼표(,) 구분</label>
                            <textarea id="vocaBulkInput" rows="4" class="w-full border border-indigo-200 bg-indigo-50/30 rounded-lg p-3 text-sm focus:border-indigo-500 outline-none transition" placeholder="단어, 뜻, 예문 (한 줄에 하나씩)"></textarea>
                        </div>
                        <div class="mt-4 flex justify-end"><button onclick="processAddVoca()" class="bg-pink-500 hover:bg-pink-600 text-white px-5 py-2.5 rounded-lg text-sm font-bold shadow-md transition flex items-center gap-2"><i class="fa-solid fa-plus"></i> 추가하기</button></div>
                    </div>

                    <div class="flex gap-4 mb-4 border-b border-slate-200 shrink-0 px-2">
                        <button onclick="setVocaTab('learning')" id="tab-learning" class="pb-2 text-sm font-bold border-b-2 border-indigo-600 text-indigo-600 transition flex items-center gap-2"><i class="fa-solid fa-fire"></i> 학습 중</button>
                        <button onclick="setVocaTab('archived')" id="tab-archived" class="pb-2 text-sm font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-600 transition flex items-center gap-2"><i class="fa-solid fa-box-archive"></i> 마스터 보관함</button>
                    </div>

                    <div id="vocaGrid" class="flex-1 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 overflow-y-auto custom-scrollbar pb-10 content-start"></div>
                </div>
            `,

        function navigateTo(pageId) {
            // 메뉴 렌더링 생략 (유지)
            document.querySelectorAll('.nav-btn').forEach(btn => {
                if (btn.id === 'nav-vault') { btn.className = "nav-btn w-full flex items-center justify-between px-4 py-3 rounded-xl bg-slate-950 text-slate-500 hover:bg-rose-950 hover:text-rose-300 transition-all duration-300 border border-slate-800 group"; }

                else { activeBtn.classList.replace('text-slate-300', 'text-white'); activeBtn.classList.add('bg-indigo-600'); }
            }
            document.getElementById('pageTitle').innerText = pageTitles[pageId];

            if (pageId === 'cloud') loadGallery(); if (pageId === 'board') initKanban(); if (pageId === 'vault') initVault(); if (pageId === 'voca') initVoca();
            if (window.innerWidth < 1024) { document.querySelector('main').scrollIntoView({ behavior: 'smooth' }); }
        }

        // ==========================================
        // 🗣️ Voca Note 핵심 로직 (탭, 보관, 전체듣기)
        // ==========================================

        function initVoca() {
            if (!currentUser) { document.getElementById('vocaGrid').innerHTML = '<p class="text-rose-500 font-bold col-span-full text-center mt-10">먼저 로그인해 주세요!</p>'; return; }

        function renderVocaGrid() {
            const grid = document.getElementById('vocaGrid');
            if (!grid) return;
            grid.innerHTML = '';

            const keys = Object.keys(vocaData).reverse().filter(k => {
                const isArchived = vocaData[k].isArchived || false;
                return currentVocaTab === 'learning' ? !isArchived : isArchived;
            });

            if (keys.length === 0) {
                grid.innerHTML = `<p class="text-slate-400 text-sm col-span-full text-center py-10">${currentVocaTab === 'learning' ? '학습할 단어가 없습니다. 위에서 추가해보세요!' : '보관된 마스터 단어가 없습니다.'}</p>`;
                return;
            }

            keys.forEach(key => {
                const item = vocaData[key];
                const archiveIcon = currentVocaTab === 'learning' ? '<i class="fa-solid fa-box-archive"></i> 보관' : '<i class="fa-solid fa-fire"></i> 학습으로 복귀';

                            </div>` : ''}

                            <div class="flex gap-3 opacity-0 group-hover:opacity-100 transition">
                                <button onclick="toggleArchive('${key}', ${!(item.isArchived || false)})" class="text-slate-300 ${archiveColor} text-xs font-bold flex items-center gap-1 transition">
                                    ${archiveIcon}
                                </button>
                                <button onclick="deleteVoca('${key}')" class="text-slate-300 hover:text-rose-500 text-xs transition"><i class="fa-solid fa-trash"></i></button>
                            </div>

                grid.innerHTML += cardHTML;

        // 💡 [신규] 보관함 상태 토글
        function toggleArchive(key, makeArchive) {
            db.ref(`users/${currentUser.uid}/voca/${key}`).update({ isArchived: makeArchive });

        // 💡 [신규] 전체 듣기 (운전 모드) 로직
        function togglePlayAll() {
            if (!window.speechSynthesis) return alert("이 브라우저에서는 음성 듣기를 지원하지 않습니다.");

            const btn = document.getElementById('playAllBtn');
            if (isPlayingAll) {
                window.speechSynthesis.cancel(); // 재생 강제 종료
                isPlayingAll = false;
                btn.innerHTML = '<i class="fa-solid fa-play"></i> 현재 탭 전체 듣기';
                btn.classList.replace('bg-rose-500', 'bg-indigo-600');
                btn.classList.replace('hover:bg-rose-600', 'hover:bg-indigo-700');
                return;
            }

            // 현재 탭에 있는 단어 키만 추출
            const keys = Object.keys(vocaData).reverse().filter(k => {
                const isArchived = vocaData[k].isArchived || false;
                return currentVocaTab === 'learning' ? !isArchived : isArchived;
            });

            if (keys.length === 0) return alert("읽을 단어가 없습니다.");

            isPlayingAll = true;
            btn.innerHTML = '<i class="fa-solid fa-stop"></i> 듣기 중지';
            btn.classList.replace('bg-indigo-600', 'bg-rose-500');
            btn.classList.replace('hover:bg-indigo-700', 'hover:bg-rose-600');

            // 큐(Queue)에 단어 -> 뜻 -> 예문 순으로 차곡차곡 쌓기
            keys.forEach(k => {
                const item = vocaData[k];

                // 1. 영어 단어 (미국인 발음)
                const uWord = new SpeechSynthesisUtterance(item.word);
                uWord.lang = 'en-US'; uWord.rate = 0.9;
                window.speechSynthesis.speak(uWord);

                // 2. 뜻 (한국인 발음 - 확실한 구분을 위해 추가!)
                const uMean = new SpeechSynthesisUtterance(item.meaning);
                uMean.lang = 'ko-KR'; uMean.rate = 1.0;
                window.speechSynthesis.speak(uMean);

                // 3. 예문 (미국인 발음)
                if (item.example) {
                    const uEx = new SpeechSynthesisUtterance(item.example);
                    uEx.lang = 'en-US'; uEx.rate = 0.9;
                    window.speechSynthesis.speak(uEx);
                }
            });

            // 모든 재생이 끝났을 때 버튼을 원래대로 돌려놓는 이벤트 리스너 추가
            // (가장 마지막에 큐에 들어간 빈 깡통 메세지의 end 이벤트를 감지)
            const uEnd = new SpeechSynthesisUtterance("End of list.");
            uEnd.lang = 'en-US'; uEnd.volume = 0; // 소리 안나게
            uEnd.onend = () => { if (isPlayingAll) togglePlayAll(); }; // 끝나면 스스로 끄기 함수 호출
            window.speechSynthesis.speak(uEnd);
        }

        // 스피커 단일 듣기 (기존 유지)
        function speakVoca(key, type) {
            const item = vocaData[key]; if (!item) return;
            const textToSpeak = type === 'word' ? item.word : item.example;
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(textToSpeak);
            msg.lang = 'en-US'; msg.rate = 0.9; window.speechSynthesis.speak(msg);
        }

        function processAddVoca() {
            if (!currentUser) return alert("로그인 필요");
            const dateStr = new Date().toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' });
            if (isBulkMode) {
                const text = document.getElementById('vocaBulkInput').value.trim();
                if (!text) return;
                const lines = text.split('\n'); let count = 0;
                lines.forEach(line => {
                    let separator = '\t'; let parts = line.split('\t');
                    if (parts.length < 2) { separator = ','; parts = line.split(','); }
                    if (parts.length >= 2) {
                        const word = parts[0].trim(); const meaning = parts[1].trim();
                        const example = parts.slice(2).join(separator).replace(/^"|"$/g, '').trim();
                        if (word && meaning) { db.ref(`users/${currentUser.uid}/voca`).push({ word, meaning, example, date: dateStr, isArchived: false }); count++; }
                    }
                });
                alert(`${count}개의 단어가 성공적으로 일괄 등록되었습니다!`);
                document.getElementById('vocaBulkInput').value = ''; toggleVocaMode();
            } else {
                const word = document.getElementById('vocaWord').value.trim(); const meaning = document.getElementById('vocaMeaning').value.trim(); const example = document.getElementById('vocaExample').value.trim();
                if (!word || !meaning) return alert("단어와 뜻은 필수입니다!");
                db.ref(`users/${currentUser.uid}/voca`).push({ word, meaning, example, date: dateStr, isArchived: false }).then(() => {
                    document.getElementById('vocaWord').value = ''; document.getElementById('vocaMeaning').value = ''; document.getElementById('vocaExample').value = '';
                });
            }
        }

        function deleteVoca(key) { if (confirm("이 카드를 영구 삭제하시겠습니까?")) db.ref(`users/${currentUser.uid}/voca/${key}`).remove(); }

        // Vault & Kanban & Cloud (기존 코드 완벽 유지)
        function initVault() { if (!currentUser) { document.getElementById('vaultTableBody').innerHTML = '<tr><td colspan="4" class="p-8 text-center text-rose-500 font-bold"><i class="fa-solid fa-lock mr-2"></i>권한이 없습니다.</td></tr>'; return; } db.ref(`users/${currentUser.uid}/tasks`).once('value').then((snapshot) => { const tbody = document.getElementById('vaultTableBody'); if (!tbody) return; boardData = snapshot.val() || {}; if (Object.keys(boardData).length === 0) { tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-slate-500">데이터가 없습니다.</td></tr>'; return; } tbody.innerHTML = ''; const statusHTML = { 'todo': '<span class="bg-rose-500/20 text-rose-400 px-2 py-1 rounded-md text-xs font-bold">계획</span>', 'doing': '<span class="bg-amber-500/20 text-amber-400 px-2 py-1 rounded-md text-xs font-bold">진행 중</span>', 'done': '<span class="bg-emerald-500/20 text-emerald-400 px-2 py-1 rounded-md text-xs font-bold">완료</span>' }; Object.keys(boardData).forEach(key => { const task = boardData[key]; const tr = document.createElement('tr'); tr.className = "hover:bg-slate-700/50 transition"; tr.innerHTML = `<td class="p-4 font-bold text-slate-200">${task.text}</td><td class="p-4">${statusHTML[task.status] || task.status}</td><td class="p-4 text-slate-400 font-mono text-xs">${task.date}</td><td class="p-4 text-slate-300 text-xs">${task.partner || '-'}</td>`; tbody.appendChild(tr); }); }); }
        function exportToCSV() { if (!currentUser || Object.keys(boardData).length === 0) return alert("데이터가 없습니다."); let csvContent = "data:text/csv;charset=utf-8,\uFEFF업무명,상태,생성일,협력업체,기자재,메모\n"; Object.keys(boardData).forEach(key => { const t = boardData[key]; const escapeCSV = (str) => '"' + String(str || "").replace(/"/g, '""') + '"'; csvContent += `${escapeCSV(t.text)},${t.status === 'todo' ? '계획' : (t.status === 'doing' ? '진행중' : '완료')},${escapeCSV(t.date)},${escapeCSV(t.partner)},${escapeCSV(t.equipment)},${escapeCSV(t.notes)}\n`; }); const link = document.createElement("a"); link.setAttribute("href", encodeURI(csvContent)); link.setAttribute("download", `ProjectLEE_DB_${new Date().toISOString().slice(0, 10)}.csv`); document.body.appendChild(link); link.click(); document.body.removeChild(link); }
        function initKanban() { if (!currentUser) { document.getElementById('col-todo').innerHTML = '<p class="text-xs text-rose-500 text-center mt-5 font-bold">로그인해 주세요!</p>'; return; } db.ref(`users/${currentUser.uid}/tasks`).on('value', (snapshot) => { const todoCol = document.getElementById('col-todo'); const doingCol = document.getElementById('col-doing'); const doneCol = document.getElementById('col-done'); if (!todoCol) return; todoCol.innerHTML = ''; doingCol.innerHTML = ''; doneCol.innerHTML = ''; boardData = snapshot.val() || {}; Object.keys(boardData).forEach(key => { const task = boardData[key]; const cardHTML = `<div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 cursor-grab active:cursor-grabbing hover:shadow-md transition relative group" draggable="true" ondragstart="dragTask(event, '${key}')" oncontextmenu="return false;" style="touch-action: none; -webkit-touch-callout: none;"><p class="text-sm font-bold text-slate-800 break-words mb-2 leading-tight pointer-events-none">${task.text}</p>${(task.partner || task.equipment || task.notes) ? '<p class="text-[10px] text-indigo-500 mb-2 font-bold pointer-events-none"><i class="fa-solid fa-message mr-1"></i>상세 내용</p>' : ''}<div class="flex justify-between items-center text-[10px] text-slate-400 font-medium mt-3 pt-2 border-t border-slate-50"><span class="pointer-events-none"><i class="fa-regular fa-clock"></i> ${task.date}</span><div class="flex gap-2"><button onclick="openModal('${key}')" class="bg-slate-100 hover:bg-indigo-100 text-slate-500 hover:text-indigo-600 w-6 h-6 rounded-md transition relative z-10"><i class="fa-solid fa-pen-to-square text-xs"></i></button><button onclick="deleteTask('${key}')" class="bg-slate-100 hover:bg-rose-100 text-slate-500 hover:text-rose-500 w-6 h-6 rounded-md transition relative z-10"><i class="fa-solid fa-trash text-xs"></i></button></div></div></div>`; if (task.status === 'todo') todoCol.innerHTML += cardHTML; else if (task.status === 'doing') doingCol.innerHTML += cardHTML; else if (task.status === 'done') doneCol.innerHTML += cardHTML; }); }); }
        function openModal(key) { currentEditKey = key; const task = boardData[key]; document.getElementById('modalTitle').innerText = task.text; document.getElementById('modalPartner').value = task.partner || ''; document.getElementById('modalEquipment').value = task.equipment || ''; document.getElementById('modalNotes').value = task.notes || ''; const modal = document.getElementById('taskModal'); const modalBox = document.getElementById('taskModalBox'); modal.classList.remove('hidden'); setTimeout(() => { modal.classList.remove('opacity-0'); modalBox.classList.remove('scale-95'); modalBox.classList.add('scale-100'); }, 10); }

        function saveTaskDetails() { if (!currentEditKey || !currentUser) return; db.ref(`users/${currentUser.uid}/tasks/${currentEditKey}`).update({ partner: document.getElementById('modalPartner').value, equipment: document.getElementById('modalEquipment').value, notes: document.getElementById('modalNotes').value }).then(() => closeModal()); }
        function addNewTask() { if (!currentUser) return; const taskText = prompt("어떤 업무를 계획 중이신가요?"); if (!taskText || taskText.trim() === "") return; db.ref(`users/${currentUser.uid}/tasks`).push({ text: taskText, status: 'todo', date: new Date().toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' }) }); }
        function deleteTask(taskKey) { if (confirm("삭제하시겠습니까?")) db.ref(`users/${currentUser.uid}/tasks/${taskKey}`).remove(); }
        function dragTask(e, taskKey) { draggedTaskKey = taskKey; e.dataTransfer.effectAllowed = "move"; } function allowDrop(e) { e.preventDefault(); e.dataTransfer.dropEffect = "move"; } function dropTask(e, newStatus) { e.preventDefault(); if (draggedTaskKey && currentUser) { db.ref(`users/${currentUser.uid}/tasks/${draggedTaskKey}`).update({ status: newStatus }); draggedTaskKey = null; } }
        function handleDragOver(e) { e.preventDefault(); document.getElementById('dropZone').classList.add('border-indigo-500', 'bg-indigo-100'); } function handleDragLeave(e) { e.preventDefault(); document.getElementById('dropZone').classList.remove('border-indigo-500', 'bg-indigo-100'); } function handleDrop(e) { e.preventDefault(); document.getElementById('dropZone').classList.remove('border-indigo-500', 'bg-indigo-100'); const file = e.dataTransfer.files[0]; if (file) uploadFile(file); } function handleFileSelect(e) { const file = e.target.files[0]; if (file) uploadFile(file); }
        function uploadFile(file) { if (!currentUser) return; if (file.size > 5 * 1024 * 1024) return alert("5MB 이하만 가능합니다."); const uploadTask = storage.ref(`users/${currentUser.uid}/cloud/${Date.now()}_${file.name}`).put(file); document.getElementById('progressContainer').classList.remove('hidden'); uploadTask.on('state_changed', (snap) => { document.getElementById('uploadProgress').style.width = (snap.bytesTransferred / snap.totalBytes * 100) + '%'; }, (err) => { document.getElementById('progressContainer').classList.add('hidden'); }, () => { document.getElementById('uploadProgress').style.width = '0%'; document.getElementById('progressContainer').classList.add('hidden'); loadGallery(); }); }
        function loadGallery() { const grid = document.getElementById('galleryGrid'); if (!grid || !currentUser) return; grid.innerHTML = '<p class="text-indigo-400 text-sm col-span-full py-10 animate-pulse">불러오는 중... ☁️</p>'; storage.ref(`users/${currentUser.uid}/cloud`).listAll().then((res) => { if (res.items.length === 0) { grid.innerHTML = '<p class="text-slate-400 text-sm col-span-full py-10">저장된 파일이 없습니다.</p>'; return; } grid.innerHTML = ''; res.items.reverse().forEach((itemRef) => { itemRef.getDownloadURL().then((url) => { const isVideo = itemRef.name.match(/\.(mp4|webm|ogg|mov)$/i); const card = document.createElement('div'); card.className = "relative group rounded-xl overflow-hidden bg-slate-200 aspect-square shadow-sm"; card.innerHTML = isVideo ? `<video src="${url}" class="w-full h-full object-cover" controls preload="metadata"></video>` : `<img src="${url}" class="w-full h-full object-cover transition duration-300 group-hover:scale-110">`; const delBtn = document.createElement('button'); delBtn.className = "absolute top-2 right-2 bg-rose-500 text-white w-8 h-8 rounded-full opacity-0 group-hover:opacity-100 transition shadow-lg flex items-center justify-center hover:bg-rose-600"; delBtn.innerHTML = '<i class="fa-solid fa-trash text-xs"></i>'; delBtn.onclick = () => { if (confirm("삭제하시겠습니까?")) itemRef.delete().then(() => loadGallery()); }; card.appendChild(delBtn); grid.appendChild(card); }); }); }); }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        @keyframes typing {
            from {
                width: 0
            }

            to {
                width: 100%
            }
        }

        @keyframes blink {

            from,
            to {
                border-color: transparent
            }

            50% {
                border-color: currentColor;
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 1024px) {
            #contentArea {
                min-height: calc(100vh - 80px);
                min-height: calc(100dvh - 80px);
            }

            #contentArea>div,
            #contentArea iframe {
                min-height: calc(100vh - 80px) !important;
                min-height: calc(100dvh - 80px) !important;
                height: 100% !important;
            }
        }

        .cursor-grab {
            touch-action: none !important;
            -webkit-touch-callout: none !important;
            -webkit-user-select: none !important;
            user-select: none !important;
        }
    </style>
</body>
