<style>
  :root {
    --sand: #f5f0e8;
    --warm: #e8ddd0;
    --ink: #1a1410;
    --muted: #7a6e65;
    --accent: #c8521a;
    --accent2: #3d6b5e;
    --accent3: #8b6914;
    --sky: #4a7fa5;
    --rose: #b84d6a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--sand);
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--ink);
    min-height: 100vh;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .content { position: relative; z-index: 1; }

  /* Header */
  .hero {
    background: linear-gradient(135deg, #1a1410 0%, #2d2318 50%, #3d3020 100%);
    padding: 3rem 2rem 2.5rem;
    position: relative;
    overflow: hidden;
  }
  .hero::after {
    content: '✈︎';
    position: absolute;
    right: 2rem;
    top: 50%;
    transform: translateY(-50%) rotate(20deg);
    font-size: 8rem;
    opacity: 0.06;
    pointer-events: none;
  }
  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    color: #f5f0e8;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .hero-title em {
    font-style: italic;
    color: #e8a96a;
  }
  .hero-sub {
    color: #a09080;
    font-size: 0.85rem;
    margin-top: 0.5rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Category filter */
  .filter-wrap {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    padding: 1.25rem 1.5rem;
    background: var(--warm);
    border-bottom: 1px solid #d5ccc0;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .filter-btn {
    padding: 0.35rem 0.9rem;
    border-radius: 999px;
    font-size: 0.78rem;
    font-weight: 500;
    border: 1.5px solid transparent;
    cursor: pointer;
    transition: all 0.18s ease;
    background: transparent;
    color: var(--muted);
    border-color: #c5bdb5;
    letter-spacing: 0.02em;
  }
  .filter-btn:hover { background: #e0d8ce; color: var(--ink); }
  .filter-btn.active {
    background: var(--ink);
    color: var(--sand);
    border-color: var(--ink);
  }

  /* Grid */
  .grid-wrap {
    padding: 1.5rem;
    columns: 1;
    column-gap: 1.25rem;
  }

  @media (min-width: 900px) { .grid-wrap { columns: 3; } }
  @media (min-width: 1200px) { .grid-wrap { columns: 4; } }

  .card {
    break-inside: avoid;
    margin-bottom: 1.25rem;
    background: #faf7f3;
    border: 1px solid #e0d8ce;
    border-radius: 12px;
    padding: 1.1rem 1.2rem 1rem;
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    opacity: 0;
    transition: opacity 0.18s ease;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.10);
    border-color: #c8b8a5;
  }
  .card:hover::before { opacity: 1; }

  /* Category colors */
  .cat-hotel::before { background: var(--sky); }
  .cat-cafe::before { background: var(--accent3); }
  .cat-food::before { background: var(--accent); }
  .cat-domestic::before { background: var(--accent2); }
  .cat-overseas::before { background: var(--rose); }
  .cat-course::before { background: #7b5ea7; }
  .cat-camping::before { background: #5a8a4a; }
  .cat-trekking::before { background: #4a7a6a; }

  .badge {
    display: inline-block;
    padding: 0.18rem 0.55rem;
    border-radius: 4px;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 0.55rem;

  .badge-cafe { background: #f5ebcc; color: #7a5808; }
  .badge-food { background: #fde8db; color: #b03a10; }
  .badge-domestic { background: #d8eeea; color: #1e5448; }
  .badge-overseas { background: #fde0e8; color: #9a2d4a; }
  .badge-course { background: #ede0f7; color: #5a3a87; }
  .badge-camping { background: #ddf0d5; color: #2e6020; }
  .badge-trekking { background: #d5ede8; color: #1e5a4a; }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.3;
    color: var(--ink);
    margin-bottom: 0.4rem;
  }
  .card-desc {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-link-icon {
    margin-top: 0.6rem;
    font-size: 0.7rem;
    color: #a09888;
    display: flex;
    align-items: center;
    gap: 0.25rem;
  }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    width: 56px; height: 56px;
    background: var(--ink);
    color: var(--sand);
    border-radius: 999px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    border: none;
    transition: transform 0.18s, box-shadow 0.18s;
    z-index: 50;
  }
  .fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(0,0,0,0.4); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20,16,10,0.65);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .modal-overlay.open { display: flex; }

  .modal-box {
    background: #faf7f3;
    border-radius: 16px;
    width: 100%;
    max-width: 540px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 2rem;
    position: relative;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .modal-close {
    position: absolute;
    top: 1rem; right: 1rem;
    background: #e8e0d5;
    border: none;
    width: 32px; height: 32px;
    border-radius: 999px;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 0.8rem;
    padding-right: 2rem;

    font-size: 0.85rem;
    color: #5a5048;
    line-height: 1.75;

// ── CAT HELPERS ────────────────────────────────────────────────────────────
const CAT_CLASS = {
  '숙소/호텔': { card: 'cat-hotel', badge: 'badge-hotel' },
  '카페/베이커리': { card: 'cat-cafe', badge: 'badge-cafe' },
  '식당/맛집': { card: 'cat-food', badge: 'badge-food' },
  '국내여행/트래킹': { card: 'cat-domestic', badge: 'badge-domestic' },
  '해외여행': { card: 'cat-overseas', badge: 'badge-overseas' },
  '여행코스': { card: 'cat-course', badge: 'badge-course' },
  '캠핑': { card: 'cat-camping', badge: 'badge-camping' },
};

const CAT_EMOJI = {
  '숙소/호텔': '🏨', '카페/베이커리': '☕', '식당/맛집': '🍽',
  '국내여행/트래킹': '🥾', '해외여행': '✈︎', '여행코스': '📋', '캠핑': '⛺'
};

function getCatClasses(cat) {
  return CAT_CLASS[cat] || { card: 'cat-domestic', badge: 'badge-domestic' };
}

// ── STATE ──────────────────────────────────────────────────────────────────
let items = [];
let activeFilter = '전체';
let dbRef = null;
let currentUser = null;

// ── FIREBASE (optional) ───────────────────────────────────────────────────
function tryInitFirebase() {
  try {
    if (typeof firebase !== 'undefined' && firebase.apps && firebase.apps.length > 0) {
      firebase.auth().onAuthStateChanged(user => {
        if (user) {
          currentUser = user;
          dbRef = firebase.database().ref(`users/${user.uid}/wishlist`);
          document.getElementById('dbStatus').textContent = '🔥 Firebase 연결됨';
          document.getElementById('dbStatus').className = 'db-status db-connected';
          dbRef.on('value', snap => {
            const val = snap.val();
            if (val) {
              const fireItems = Object.entries(val).map(([k, v]) => ({ id: k, ...v }));
              items = [...SEED, ...fireItems.filter(f => !SEED.find(s => s.id === f.id))];
            } else {
              items = [...SEED];
            }
            renderCards();
          });
        } else {
          items = [...SEED];
          renderCards();
        }
      });
      return true;
    }
  } catch (e) {}
  return false;
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function renderCards() {
  const grid = document.getElementById('cardGrid');
  const filtered = activeFilter === '전체' ? items : items.filter(i => i.category === activeFilter);
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🗺</div><div class="empty-text">이 카테고리에 아직 등록된 장소가 없어요.</div></div>`;
    return;
  }
  grid.innerHTML = filtered.map(item => {
    const cls = getCatClasses(item.category);
    const emoji = CAT_EMOJI[item.category] || '📍';
    const hasLink = item.urls && item.urls.length > 0;
    const shortMemo = (item.memo || '').replace(/\n/g, ' ');
    return `
      <div class="card ${cls.card}" data-id="${item.id}" onclick="openDetail('${item.id}')">
        <span class="badge ${cls.badge}">${emoji} ${item.category}</span>
        <div class="card-title">${item.title}</div>
        <div class="card-desc">${shortMemo}</div>
        ${hasLink ? `<div class="card-link-icon"><span>🔗</span><span>링크 있음</span></div>` : ''}
      </div>
    `;
  }).join('');
}

// ── DETAIL MODAL ──────────────────────────────────────────────────────────
function openDetail(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  const cls = getCatClasses(item.category);
  const emoji = CAT_EMOJI[item.category] || '📍';

  document.getElementById('detailBadge').innerHTML = `<span class="badge ${cls.badge}" style="margin-bottom:0.8rem;">${emoji} ${item.category}</span>`;
  document.getElementById('detailTitle').textContent = item.title;

  // Render memo with paragraph breaks
  const memoDiv = document.getElementById('detailMemo');
  const paras = (item.memo || '').split(/\n\n+/);
  if (paras.length > 1) {
    memoDiv.innerHTML = paras.map(p =>
      `<div class="modal-memo-para">${p.replace(/\n/g, '<br>')}</div>`
    ).join('');
  } else {
    memoDiv.innerHTML = `<div class="modal-memo-para">${(item.memo || '').replace(/\n/g, '<br>')}</div>`;
  }

  // Links
  const linksDiv = document.getElementById('detailLinks');
  if (item.urls && item.urls.length > 0) {
    linksDiv.innerHTML = item.urls.map((url, i) => {
      const label = url.includes('map.naver') ? `🗺 지도 ${i > 0 ? i + 1 : ''}` :
                    url.includes('youtube') || url.includes('youtu.be') ? `▶ 영상 보기` :
                    url.includes('blog.naver') ? `📝 블로그 보기` : `🔗 링크 열기`;
      return `<a href="${url}" target="_blank" rel="noopener" class="modal-link">${label}</a> `;
    }).join('');
  } else {
    linksDiv.innerHTML = '';
  }

  document.getElementById('detailModal').classList.add('open');
}

document.getElementById('detailClose').onclick = () => document.getElementById('detailModal').classList.remove('open');
document.getElementById('detailModal').onclick = (e) => { if (e.target === e.currentTarget) e.currentTarget.classList.remove('open'); };

// ── ADD MODAL ─────────────────────────────────────────────────────────────
document.getElementById('fabAdd').onclick = () => document.getElementById('addModal').classList.add('open');
document.getElementById('addClose').onclick = () => document.getElementById('addModal').classList.remove('open');
document.getElementById('addModal').onclick = (e) => { if (e.target === e.currentTarget) e.currentTarget.classList.remove('open'); };

document.getElementById('btnSave').onclick = () => {
  const cat = document.getElementById('fCat').value;
  const title = document.getElementById('fTitle').value.trim();
  const memo = document.getElementById('fMemo').value.trim();
  const url = document.getElementById('fUrl').value.trim();

  if (!title) { alert('장소명을 입력해주세요.'); return; }

  const newItem = {
    id: 'u_' + Date.now(),
    category: cat,
    title,
    memo,
    urls: url ? [url] : [],
    createdAt: Date.now()
  };

  // Save to Firebase if connected
  if (dbRef) {
    dbRef.push({ category: cat, title, memo, urls: url ? [url] : [], createdAt: Date.now() });
  } else {
    items.unshift(newItem);
    renderCards();
  }

  // Reset form
  document.getElementById('fTitle').value = '';
  document.getElementById('fMemo').value = '';
  document.getElementById('fUrl').value = '';
  document.getElementById('addModal').classList.remove('open');
};

// ── FILTER ────────────────────────────────────────────────────────────────
document.getElementById('filterWrap').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.cat;
  renderCards();
});

// ── INIT ──────────────────────────────────────────────────────────────────
const firebaseConnected = tryInitFirebase();
if (!firebaseConnected) {
  items = [...SEED];
  renderCards();
}
</script>
