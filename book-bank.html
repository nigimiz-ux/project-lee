<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Bank — LEE's 서재</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap"
    rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    :root {
      --ink: #1a1410;
      --paper: #faf7f2;
      --cream: #f2ede4;
      --warm-mid: #c9b99a;
      --accent: #8b5e3c;
      --accent-light: #d4956a;
      --green: #4a7c59;
      --green-light: #e8f2eb;
      --blue: #3a5f8a;
      --blue-light: #e8f0f8;
      --border: #e0d8cc;
      --shadow: rgba(26, 20, 16, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: var(--paper);
      color: var(--ink);
      min-height: 100vh;
    }

    .serif {
      font-family: 'Noto Serif KR', serif;
    }

    .display {
      font-family: 'Playfair Display', serif;
    }

    /* Header */
    .app-header {
      background: var(--ink);
      color: var(--paper);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 2px solid var(--accent);
    }

    .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      letter-spacing: 0.02em;
    }

    .logo-sub {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--warm-mid);
      text-transform: uppercase;
    }

    /* Tabs */
    .tab-bar {
      background: var(--ink);
      display: flex;
      border-bottom: 2px solid var(--accent);
      overflow-x: auto;
      scrollbar-width: none;
    }

    .tab-bar::-webkit-scrollbar {
      display: none;
    }

    .tab-btn {
      flex: 1;
      min-width: 100px;
      padding: 0.85rem 1rem;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: var(--warm-mid);
      border: none;
      background: transparent;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      position: relative;
      font-family: 'Noto Sans KR', sans-serif;
    }

    .tab-btn.active {
      color: var(--paper);
      background: rgba(255, 255, 255, 0.05);
    }

    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent-light);
    }

    .tab-btn:hover:not(.active) {
      color: var(--cream);
    }

    .tab-badge {
      display: inline-block;
      background: var(--accent);
      color: white;
      font-size: 0.65rem;
      border-radius: 9999px;
      padding: 0 0.4rem;
      margin-left: 0.3rem;
      vertical-align: middle;
      line-height: 1.5;
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    .main-content {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem 1rem;
    }

    /* Add Form */
    .add-form-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 2px 8px var(--shadow);
    }

    .form-title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    @media (min-width: 640px) {
      .form-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    .form-label {
      font-size: 0.7rem;
      font-weight: 500;
      color: #888;
      letter-spacing: 0.05em;
    }

    .form-input,
    .form-select {
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 0.55rem 0.75rem;
      font-size: 0.875rem;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--ink);
      background: var(--paper);
      transition: border-color 0.15s;
      outline: none;
    }

    .form-input:focus,
    .form-select:focus {
      border-color: var(--accent);
      background: white;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 1.1rem;
      border-radius: 7px;
      font-size: 0.8rem;
      font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      border: none;
      letter-spacing: 0.03em;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: #7a5234;
      transform: translateY(-1px);
    }

    .btn-green {
      background: var(--green);
      color: white;
      font-size: 0.75rem;
      padding: 0.4rem 0.85rem;
    }

    .btn-green:hover {
      background: #3d6b4a;
    }

    .btn-blue {
      background: var(--blue);
      color: white;
      font-size: 0.75rem;
      padding: 0.4rem 0.85rem;
    }

    .btn-blue:hover {
      background: #2f4f75;
    }

    .btn-ghost {
      background: transparent;
      color: var(--accent);
      border: 1.5px solid var(--border);
      font-size: 0.75rem;
      padding: 0.4rem 0.85rem;
    }

    .btn-ghost:hover {
      border-color: var(--accent);
      background: var(--cream);
    }

    .btn-danger {
      background: transparent;
      color: #c0392b;
      border: 1.5px solid #f0c0bc;
      font-size: 0.7rem;
      padding: 0.35rem 0.7rem;
    }

    .btn-danger:hover {
      background: #fdf0ef;
    }

    /* Book Cards */
    .book-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .book-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      box-shadow: 0 1px 4px var(--shadow);
      transition: box-shadow 0.2s, transform 0.15s;
      cursor: default;
    }

    .book-card:hover {
      box-shadow: 0 4px 12px var(--shadow);
      transform: translateY(-1px);
    }

    .book-spine {
      width: 4px;
      align-self: stretch;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .spine-toread {
      background: var(--warm-mid);
    }

    .spine-reading {
      background: var(--green);
    }

    .spine-library {
      background: var(--accent);
    }

    .book-info {
      flex: 1;
      min-width: 0;
    }

    .book-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 0.975rem;
      font-weight: 600;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .book-author {
      font-size: 0.78rem;
      color: #888;
      margin-top: 0.15rem;
    }

    .book-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-top: 0.4rem;
    }

    .meta-tag {
      font-size: 0.65rem;
      padding: 0.15rem 0.5rem;
      border-radius: 9999px;
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    .tag-lang {
      background: #e8f0f8;
      color: var(--blue);
    }

    .tag-format {
      background: var(--cream);
      color: var(--accent);
    }

    .tag-source {
      background: #f0ede8;
      color: #7a6a5a;
    }

    .tag-date {
      background: var(--green-light);
      color: var(--green);
    }

    .book-actions {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--warm-mid);
    }

    .empty-icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
    }

    .empty-text {
      font-size: 0.875rem;
      font-family: 'Noto Serif KR', serif;
    }

    /* Library Expand */
    .library-card {
      cursor: pointer;
      flex-direction: column;
      align-items: stretch;
      gap: 0;
    }

    .library-card-header {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .library-card-body {
      display: none;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .library-card-body.open {
      display: block;
    }

    .notes-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    @media (max-width: 600px) {
      .notes-grid {
        grid-template-columns: 1fr;
      }
    }

    .note-section-title {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .note-raw .note-section-title {
      color: var(--accent);
    }

    .note-review .note-section-title {
      color: var(--blue);
    }

    .note-textarea {
      width: 100%;
      min-height: 160px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 0.82rem;
      font-family: 'Noto Sans KR', sans-serif;
      line-height: 1.7;
      color: var(--ink);
      background: var(--paper);
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }

    .note-textarea:focus {
      border-color: var(--accent);
      background: white;
    }

    /* Modal */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(26, 20, 16, 0.65);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .overlay.open {
      display: flex;
    }

    .modal {
      background: white;
      border-radius: 14px;
      width: 100%;
      max-width: 620px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 1.75rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      margin-bottom: 0.35rem;
    }

    .modal-sub {
      font-size: 0.78rem;
      color: #999;
      margin-bottom: 1.25rem;
      line-height: 1.6;
    }

    .import-textarea {
      width: 100%;
      min-height: 220px;
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      padding: 1rem;
      font-size: 0.82rem;
      font-family: 'Noto Sans KR', sans-serif;
      line-height: 1.7;
      color: var(--ink);
      background: var(--cream);
      resize: vertical;
      outline: none;
    }

    .import-preview {
      margin-top: 1rem;
      display: none;
    }

    .import-preview.show {
      display: block;
    }

    .preview-item {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 0.5rem;
      font-size: 0.8rem;
    }

    .preview-item-title {
      font-weight: 600;
      font-family: 'Noto Serif KR', serif;
    }

    .preview-item-author {
      color: #888;
      font-size: 0.75rem;
      margin-top: 0.15rem;
    }

    .preview-item-snippet {
      font-size: 0.72rem;
      color: #aaa;
      margin-top: 0.3rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--ink);
      color: var(--paper);
      padding: 0.75rem 1.5rem;
      border-radius: 9999px;
      font-size: 0.82rem;
      font-weight: 500;
      z-index: 300;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .section-divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.5rem 0 1rem;
    }

    .section-divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .section-divider-text {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--warm-mid);
    }

    .stats-bar {
      background: white;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1.25rem;
      display: flex;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 1px 4px var(--shadow);
      overflow-x: auto;
    }

    .stat-item {
      text-align: center;
      min-width: 60px;
    }

    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }

    .stat-label {
      font-size: 0.65rem;
      color: #aaa;
      letter-spacing: 0.05em;
      margin-top: 0.2rem;
    }

    .stat-divider {
      width: 1px;
      background: var(--border);
      flex-shrink: 0;
    }

    .sort-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .sort-label {
      font-size: 0.72rem;
      color: #aaa;
    }

    .sort-btn {
      font-size: 0.7rem;
      padding: 0.25rem 0.65rem;
      border-radius: 9999px;
      border: 1px solid var(--border);
      background: transparent;
      color: #888;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Noto Sans KR', sans-serif;
    }

    .sort-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .chevron {
      transition: transform 0.2s;
      flex-shrink: 0;
      color: var(--warm-mid);
      font-size: 0.8rem;
    }

    .chevron.open {
      transform: rotate(180deg);
    }

    .reading-days {
      font-size: 0.72rem;
      color: var(--green);
      font-weight: 600;
    }

    @media (max-width: 480px) {
      .book-actions {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .app-header {
        padding: 1rem;
      }

      .logo-text {
        font-size: 1.25rem;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <header class="app-header">
    <div>
      <div class="logo-text display">Book Bank</div>
      <div class="logo-sub">LEE's Personal Library</div>
    </div>
    <button class="btn btn-ghost" onclick="openImportModal()"
      style="border-color: rgba(255,255,255,0.2); color: var(--paper); font-size:0.72rem;">
      📥 기존 데이터 일괄 등록
    </button>
  </header>

  <nav class="tab-bar">
    <button class="tab-btn active" id="tab-toread" onclick="switchTab('toread')">📚 읽을 예정 <span class="tab-badge"
        id="badge-toread">0</span></button>
    <button class="tab-btn" id="tab-reading" onclick="switchTab('reading')">📖 읽고 있는 책 <span class="tab-badge"
        id="badge-reading">0</span></button>
    <button class="tab-btn" id="tab-library" onclick="switchTab('library')">🏛 LEE's 서재 <span class="tab-badge"
        id="badge-library">0</span></button>
  </nav>

  <div class="tab-panel active" id="panel-toread">
    <div class="main-content">
      <div class="add-form-card">
        <div class="form-title">📌 새 책 추가 — 읽을 예정</div>
        <div class="form-grid">
          <div class="form-group full"><label class="form-label">제목 *</label><input class="form-input" id="tr-title"
              type="text" placeholder="책 제목을 입력하세요"></div>
          <div class="form-group"><label class="form-label">저자 *</label><input class="form-input" id="tr-author"
              type="text" placeholder="저자명"></div>
          <div class="form-group"><label class="form-label">언어</label><select class="form-select" id="tr-lang">
              <option value="한국어">한국어</option>
              <option value="번역본">번역본</option>
              <option value="영어">영어</option>
              <option value="기타">기타</option>
            </select></div>
          <div class="form-group"><label class="form-label">형태</label><select class="form-select" id="tr-format">
              <option value="인쇄본">인쇄본</option>
              <option value="전자책">전자책</option>
              <option value="오디오북">오디오북</option>
            </select></div>
          <div class="form-group"><label class="form-label">추천 소스</label><select class="form-select"
              id="tr-source-select" onchange="toggleSourceInput('toread')">
              <option value="유튜브">유튜브</option>
              <option value="동호회">동호회</option>
              <option value="지면">지면</option>
              <option value="직접입력">직접 입력</option>
            </select></div>
          <div class="form-group" id="tr-source-custom-wrap" style="display:none;"><label class="form-label">직접
              입력</label><input class="form-input" id="tr-source-custom" type="text" placeholder="소스 직접 입력"></div>
        </div>
        <div style="margin-top:1rem; display:flex; justify-content:flex-end;"><button class="btn btn-primary"
            onclick="addBook('toread')">+ 목록에 추가</button></div>
      </div>
      <div class="section-divider">
        <div class="section-divider-line"></div>
        <div class="section-divider-text">읽을 책 목록</div>
        <div class="section-divider-line"></div>
      </div>
      <div class="book-list" id="list-toread"></div>
    </div>
  </div>

  <div class="tab-panel" id="panel-reading">
    <div class="main-content">
      <div class="add-form-card">
        <div class="form-title">⚡ 바로 읽기 시작 — 예정 없이 시작하는 책</div>
        <div class="form-grid">
          <div class="form-group full"><label class="form-label">제목 *</label><input class="form-input" id="rd-title"
              type="text" placeholder="책 제목을 입력하세요"></div>
          <div class="form-group"><label class="form-label">저자 *</label><input class="form-input" id="rd-author"
              type="text" placeholder="저자명"></div>
          <div class="form-group"><label class="form-label">언어</label><select class="form-select" id="rd-lang">
              <option value="한국어">한국어</option>
              <option value="번역본">번역본</option>
              <option value="영어">영어</option>
              <option value="기타">기타</option>
            </select></div>
          <div class="form-group"><label class="form-label">형태</label><select class="form-select" id="rd-format">
              <option value="인쇄본">인쇄본</option>
              <option value="전자책">전자책</option>
              <option value="오디오북">오디오북</option>
            </select></div>
          <div class="form-group"><label class="form-label">추천 소스</label><select class="form-select"
              id="rd-source-select" onchange="toggleSourceInput('reading')">
              <option value="유튜브">유튜브</option>
              <option value="동호회">동호회</option>
              <option value="지면">지면</option>
              <option value="직접입력">직접 입력</option>
            </select></div>
          <div class="form-group" id="rd-source-custom-wrap" style="display:none;"><label class="form-label">직접
              입력</label><input class="form-input" id="rd-source-custom" type="text" placeholder="소스 직접 입력"></div>
        </div>
        <div style="margin-top:1rem; display:flex; justify-content:flex-end;"><button class="btn btn-green"
            onclick="addBook('reading')">📖 읽기 시작</button></div>
      </div>
      <div class="section-divider">
        <div class="section-divider-line"></div>
        <div class="section-divider-text">현재 읽고 있는 책</div>
        <div class="section-divider-line"></div>
      </div>
      <div class="book-list" id="list-reading"></div>
    </div>
  </div>

  <div class="tab-panel" id="panel-library">
    <div class="main-content">
      <div class="stats-bar" id="stats-bar">
        <div class="stat-item">
          <div class="stat-num" id="stat-total">0</div>
          <div class="stat-label">전체</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <div class="stat-num" id="stat-year">0</div>
          <div class="stat-label">올해</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <div class="stat-num" id="stat-kr">0</div>
          <div class="stat-label">한국어</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <div class="stat-num" id="stat-trans">0</div>
          <div class="stat-label">번역본</div>
        </div>
      </div>
      <div class="sort-bar">
        <span class="sort-label">정렬:</span>
        <button class="sort-btn active" id="sort-recent" onclick="sortLibrary('recent')">최신순</button>
        <button class="sort-btn" id="sort-title" onclick="sortLibrary('title')">제목순</button>
        <button class="sort-btn" id="sort-author" onclick="sortLibrary('author')">저자순</button>
      </div>
      <div class="book-list" id="list-library"></div>
    </div>
  </div>

  <div class="overlay" id="import-overlay" onclick="closeImportOnOutside(event)">
    <div class="modal">
      <div class="modal-title display">기존 데이터 일괄 등록</div>
      <div class="modal-sub">
        네이버 메모장 내용을 그대로 붙여넣으세요.<br>
        <code
          style="background:var(--cream); padding:0.1rem 0.4rem; border-radius:4px; font-size:0.78rem;">[책] 제목 - 저자</code>
        패턴을 자동 인식하여 서재에 등록합니다.
      </div>
      <textarea class="import-textarea" id="import-textarea"
        placeholder="예시:&#10;[책] 채식주의자 - 한강&#10;&#10;이 책은 폭력과 인간의 욕망에 대한...&#10;&#10;[책] 82년생 김지영 - 조남주&#10;&#10;한국 사회의 여성으로 살아간다는 것은..."
        oninput="previewImport()"></textarea>
      <div class="import-preview" id="import-preview">
        <div
          style="font-size:0.72rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--accent); margin-bottom:0.5rem;">
          인식된 책 목록 미리보기</div>
        <div id="import-preview-list"></div>
      </div>
      <div style="display:flex; justify-content:flex-end; gap:0.75rem; margin-top:1.25rem;">
        <button class="btn btn-ghost" onclick="closeImportModal()">취소</button>
        <button class="btn btn-primary" onclick="importLegacyMemos()">📥 서재에 일괄 등록</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ============================================================
    //  FIREBASE CONFIG & INIT
    // ============================================================
    const firebaseConfig = {
      apiKey: "AIzaSyDcQNHIUYSbJe8qnc4EqzRpGmQ4qufz7Ok",
      authDomain: "aje-executive-db.firebaseapp.com",
      databaseURL: "https://aje-executive-db-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "aje-executive-db",
      storageBucket: "aje-executive-db.firebasestorage.app",
      messagingSenderId: "25421275822",
      appId: "1:25421275822:web:8de86422d025e2cd25c33f"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const firestore_db = firebase.database();
    let currentUser = null;

    let db = { toread: [], reading: [], library: [] };
    let librarySortMode = 'recent';

    // 인증 상태 리스너 (부모 창인 Project LEE에서 로그인 시 자동 연동)
    auth.onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        fb_loadAll(); // 로그인 확인되면 DB에서 데이터 불러오기
      } else {
        showToast('⚠️ 로그인 정보가 없습니다. 메인 화면에서 로그인해주세요.');
      }
    });

    // ============================================================
    //  FIREBASE FUNCTIONS (CTO 튜닝 적용)
    // ============================================================
    function fb_loadAll() {
      firestore_db.ref(`users/${currentUser.uid}/books`).on('value', snap => {
        db = { toread: [], reading: [], library: [] };
        const data = snap.val() || {};
        Object.keys(data).forEach(key => {
          const b = { ...data[key] };
          if (b.status === 'toread') db.toread.push(b);
          else if (b.status === 'reading') db.reading.push(b);
          else if (b.status === 'library') db.library.push(b);
        });
        renderAll();
      });
    }

    function fb_addBook(book) {
      if (!currentUser) return;
      firestore_db.ref(`users/${currentUser.uid}/books/${book.id}`).set(book);
    }

    function fb_updateBook(id, updates) {
      if (!currentUser) return;
      firestore_db.ref(`users/${currentUser.uid}/books/${id}`).update(updates);
    }

    function fb_deleteBook(id) {
      if (!currentUser) return;
      firestore_db.ref(`users/${currentUser.uid}/books/${id}`).remove();
    }

    // ============================================================
    //  UTILITY
    // ============================================================
    function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
    function formatDate(ts) { if (!ts) return ''; const d = new Date(ts); return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')}`; }
    function daysDiff(from, to) { return Math.floor((to - from) / 86400000); }
    function showToast(msg) { const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 2500); }
    function toggleSourceInput(tab) { const prefix = tab === 'toread' ? 'tr' : 'rd'; const sel = document.getElementById(prefix + '-source-select').value; const wrap = document.getElementById(prefix + '-source-custom-wrap'); wrap.style.display = sel === '직접입력' ? 'block' : 'none'; }
    function getSourceValue(prefix) { const sel = document.getElementById(prefix + '-source-select').value; if (sel === '직접입력') { return document.getElementById(prefix + '-source-custom').value.trim() || '기타'; } return sel; }
    function clearForm(prefix) { ['title', 'author', 'source-custom'].forEach(f => { const el = document.getElementById(prefix + '-' + f); if (el) el.value = ''; }); const sel = document.getElementById(prefix + '-source-select'); if (sel) sel.value = '유튜브'; const wrap = document.getElementById(prefix + '-source-custom-wrap'); if (wrap) wrap.style.display = 'none'; }
    function escHtml(str) { return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

    // ============================================================
    //  BOOK CRUD
    // ============================================================
    function addBook(tab) {
      const prefix = tab === 'toread' ? 'tr' : 'rd';
      const title = document.getElementById(prefix + '-title').value.trim();
      const author = document.getElementById(prefix + '-author').value.trim();
      if (!title) { showToast('⚠️ 제목을 입력해주세요'); return; }
      if (!author) { showToast('⚠️ 저자를 입력해주세요'); return; }

      const lang = document.getElementById(prefix + '-lang').value;
      const format = document.getElementById(prefix + '-format').value;
      const source = getSourceValue(prefix);
      const now = Date.now();

      const book = { id: generateId(), title, author, lang, format, source, status: tab, addedAt: now, startedAt: tab === 'reading' ? now : null, completedAt: null, memoRaw: '', memoReview: '' };

      fb_addBook(book); // DB만 찌르면 on('value')가 화면을 그림
      clearForm(prefix);
      showToast(`📚 "${title}" 추가됨`);
    }

    function moveToReading(id) {
      fb_updateBook(id, { status: 'reading', startedAt: Date.now() });
      showToast(`📖 독서 시작!`);
    }

    function moveToLibrary(id) {
      fb_updateBook(id, { status: 'library', completedAt: Date.now() });
      showToast(`🏛 서재에 등록!`);
    }

    function deleteBook(status, id) {
      if (!confirm('이 책을 삭제할까요?')) return;
      fb_deleteBook(id);
      showToast('🗑 삭제됨');
    }

    function saveNotes(id) {
      const raw = document.getElementById('raw-' + id).value;
      const review = document.getElementById('review-' + id).value;
      fb_updateBook(id, { memoRaw: raw, memoReview: review });
      showToast('💾 저장됨');
    }

    // ============================================================
    //  🚀 [CTO 패치] PARSE LEGACY MEMO (완벽한 중복 방지 로직)
    // ============================================================
    function parseLegacyMemo(rawText) {
      const pattern = /^\[책\]\s*(.+?)\s*[-–—]\s*(.+?)\s*$/;
      const lines = rawText.split('\n');
      const books = [];
      let current = null;
      let memoLines = [];

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        const match = line.match(pattern);

        if (match) {
          const parsedTitle = match[1].trim();
          const parsedAuthor = match[2].trim();

          // 💡 핵심 로직: 이전 책과 제목이 같으면 새로운 책으로 쪼개지 않고 본문에 합침
          if (current && current.title === parsedTitle) {
            memoLines.push(line);
          } else {
            // 진짜 새로운 책이면 기존 책을 리스트에 넣고 새로 시작
            if (current) {
              current.memoRaw = memoLines.join('\n').trim();
              books.push(current);
            }
            current = { title: parsedTitle, author: parsedAuthor };
            memoLines = [];
          }
        } else {
          if (current) memoLines.push(line);
        }
      }

      if (current) {
        current.memoRaw = memoLines.join('\n').trim();
        books.push(current);
      }
      return books;
    }

    // ============================================================
    //  IMPORT LEGACY MEMOS
    // ============================================================
    function previewImport() {
      const raw = document.getElementById('import-textarea').value;
      const books = parseLegacyMemo(raw);
      const preview = document.getElementById('import-preview');
      const list = document.getElementById('import-preview-list');

      if (books.length === 0) { preview.classList.remove('show'); return; }
      list.innerHTML = books.map(b => `<div class="preview-item"><div class="preview-item-title">${escHtml(b.title)}</div><div class="preview-item-author">저자: ${escHtml(b.author)}</div><div class="preview-item-snippet">${escHtml(b.memoRaw.slice(0, 80))}${b.memoRaw.length > 80 ? '…' : ''}</div></div>`).join('');
      preview.classList.add('show');
    }

    function importLegacyMemos() {
      const raw = document.getElementById('import-textarea').value;
      const books = parseLegacyMemo(raw);
      if (books.length === 0) { showToast('⚠️ 인식된 책이 없습니다.'); return; }

      const now = Date.now();
      books.forEach(b => {
        const book = { id: generateId(), title: b.title, author: b.author, lang: '한국어', format: '인쇄본', source: '메모 임포트', status: 'library', addedAt: now, startedAt: null, completedAt: now, memoRaw: b.memoRaw, memoReview: '' };
        fb_addBook(book); // DB에 쏘기
      });

      closeImportModal();
      document.getElementById('import-textarea').value = '';
      document.getElementById('import-preview').classList.remove('show');
      showToast(`📚 서재에 일괄 등록 요청됨`);
    }

    // ============================================================
    //  RENDER FUNCTIONS
    // ============================================================
    function renderToRead() {
      const list = document.getElementById('list-toread');
      if (db.toread.length === 0) { list.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">읽을 책을 추가해보세요</div></div>`; return; }
      list.innerHTML = db.toread.map(book => `<div class="book-card"><div class="book-spine spine-toread"></div><div class="book-info"><div class="book-title">${escHtml(book.title)}</div><div class="book-author">${escHtml(book.author)}</div><div class="book-meta"><span class="meta-tag tag-lang">${escHtml(book.lang)}</span><span class="meta-tag tag-format">${escHtml(book.format)}</span><span class="meta-tag tag-source">${escHtml(book.source)}</span></div></div><div class="book-actions"><button class="btn btn-green" onclick="moveToReading('${book.id}')">▶ 독서 시작</button><button class="btn btn-danger" onclick="deleteBook('toread','${book.id}')">삭제</button></div></div>`).join('');
    }

    function renderReading() {
      const list = document.getElementById('list-reading');
      if (db.reading.length === 0) { list.innerHTML = `<div class="empty-state"><div class="empty-icon">📖</div><div class="empty-text">현재 읽고 있는 책이 없습니다</div></div>`; return; }
      const now = Date.now();
      list.innerHTML = db.reading.map(book => {
        const days = book.startedAt ? daysDiff(book.startedAt, now) : 0;
        return `<div class="book-card"><div class="book-spine spine-reading"></div><div class="book-info"><div class="book-title">${escHtml(book.title)}</div><div class="book-author">${escHtml(book.author)}</div><div class="book-meta"><span class="meta-tag tag-lang">${escHtml(book.lang)}</span><span class="meta-tag tag-format">${escHtml(book.format)}</span>${book.startedAt ? `<span class="meta-tag tag-date">시작: ${formatDate(book.startedAt)}</span>` : ''}</div>${book.startedAt ? `<div class="reading-days" style="margin-top:0.35rem;">📅 읽은 지 ${days}일째</div>` : ''}</div><div class="book-actions"><button class="btn btn-blue" onclick="moveToLibrary('${book.id}')">✓ 독서 완료</button><button class="btn btn-danger" onclick="deleteBook('reading','${book.id}')">삭제</button></div></div>`
      }).join('');
    }

    function renderLibrary() {
      const sorted = [...db.library];
      if (librarySortMode === 'recent') sorted.sort((a, b) => (b.completedAt || 0) - (a.completedAt || 0));
      else if (librarySortMode === 'title') sorted.sort((a, b) => a.title.localeCompare(b.title, 'ko'));
      else if (librarySortMode === 'author') sorted.sort((a, b) => a.author.localeCompare(b.author, 'ko'));

      const list = document.getElementById('list-library');
      if (sorted.length === 0) { list.innerHTML = `<div class="empty-state"><div class="empty-icon">🏛</div><div class="empty-text">완독한 책이 여기 쌓입니다</div></div>`; return; }
      list.innerHTML = sorted.map(book => `<div class="book-card library-card" id="lcard-${book.id}" onclick="toggleLibraryCard('${book.id}', event)"><div class="library-card-header"><div class="book-spine spine-library" style="align-self:stretch; height:auto; min-height:40px;"></div><div class="book-info"><div class="book-title">${escHtml(book.title)}</div><div class="book-author">${escHtml(book.author)}</div><div class="book-meta"><span class="meta-tag tag-lang">${escHtml(book.lang)}</span><span class="meta-tag tag-format">${escHtml(book.format)}</span>${book.completedAt ? `<span class="meta-tag tag-date">완독: ${formatDate(book.completedAt)}</span>` : ''}${(book.memoRaw || '').length > 0 ? `<span class="meta-tag" style="background:#f5f0e8;color:#a0804a;">📝 메모 있음</span>` : ''}</div></div><div style="display:flex; flex-direction:column; align-items:flex-end; gap:0.4rem; flex-shrink:0;"><span class="chevron" id="chev-${book.id}">▼</span><button class="btn btn-danger" onclick="event.stopPropagation(); deleteBook('library','${book.id}')">삭제</button></div></div><div class="library-card-body" id="lbody-${book.id}" onclick="event.stopPropagation()"><div class="notes-grid"><div class="note-raw"><div class="note-section-title">📝 메모장 (Raw Memo)</div><textarea class="note-textarea" id="raw-${book.id}" placeholder="읽으면서 떠오른 생각, 인상적인 구절, 파편화된 감상을 자유롭게...">${escHtml(book.memoRaw || '')}</textarea></div><div class="note-review"><div class="note-section-title">✍ 정리장 (Review)</div><textarea class="note-textarea" id="review-${book.id}" placeholder="동호회·블로그 등에 올릴 정제된 글을 여기에...">${escHtml(book.memoReview || '')}</textarea></div></div><div style="display:flex; justify-content:flex-end; margin-top:0.75rem;"><button class="btn btn-primary" onclick="saveNotes('${book.id}')">💾 저장</button></div></div></div>`).join('');

      const year = new Date().getFullYear();
      document.getElementById('stat-total').textContent = db.library.length;
      document.getElementById('stat-year').textContent = db.library.filter(b => b.completedAt && new Date(b.completedAt).getFullYear() === year).length;
      document.getElementById('stat-kr').textContent = db.library.filter(b => b.lang === '한국어').length;
      document.getElementById('stat-trans').textContent = db.library.filter(b => b.lang === '번역본').length;
    }

    function renderBadges() {
      document.getElementById('badge-toread').textContent = db.toread.length;
      document.getElementById('badge-reading').textContent = db.reading.length;
      document.getElementById('badge-library').textContent = db.library.length;
    }
    function renderAll() { renderToRead(); renderReading(); renderLibrary(); renderBadges(); }

    // ============================================================
    //  INTERACTIONS
    // ============================================================
    function toggleLibraryCard(id, e) {
      const body = document.getElementById('lbody-' + id);
      const chev = document.getElementById('chev-' + id);
      const isOpen = body.classList.contains('open');
      document.querySelectorAll('.library-card-body.open').forEach(el => el.classList.remove('open'));
      document.querySelectorAll('.chevron.open').forEach(el => el.classList.remove('open'));
      if (!isOpen) { body.classList.add('open'); chev.classList.add('open'); }
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.getElementById('panel-' + tab).classList.add('active');
    }

    function sortLibrary(mode) {
      librarySortMode = mode;
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('sort-' + mode).classList.add('active');
      renderLibrary();
    }

    function openImportModal() { document.getElementById('import-overlay').classList.add('open'); }
    function closeImportModal() { document.getElementById('import-overlay').classList.remove('open'); }
    function closeImportOnOutside(e) { if (e.target === document.getElementById('import-overlay')) closeImportModal(); }

  </script>
</body>

</html>
